app = 'shooter-io-sg'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.alive]
    type = 'tcp'
    port = 3000
    interval = '15s'
    timeout = '2s'
