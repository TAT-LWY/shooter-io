<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooter.IO</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}
canvas { display: block; cursor: crosshair; }

#menu {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}
#menu.hidden { display: none; }
#menuBox { text-align: center; color: #fff; width: 320px; }
#menuBox h1 {
  font-size: 48px; margin-bottom: 8px;
  background: linear-gradient(135deg, #e74c3c, #f39c12);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#menuBox .subtitle { color: #888; margin-bottom: 24px; }

/* Auth forms */
.auth-section { margin-bottom: 20px; }
.auth-tabs {
  display: flex; margin-bottom: 16px; border-radius: 8px; overflow: hidden;
  border: 1px solid #333;
}
.auth-tab {
  flex: 1; padding: 10px; background: #222; color: #888;
  border: none; cursor: pointer; font-size: 14px; font-weight: bold;
  transition: all 0.2s;
}
.auth-tab.active { background: #e74c3c; color: #fff; }
.auth-tab:hover:not(.active) { background: #2a2a2a; }

.auth-form { display: none; }
.auth-form.active { display: block; }

.input-group { margin-bottom: 12px; }
.input-group input {
  width: 100%; padding: 12px 16px; font-size: 16px;
  border: 2px solid #333; border-radius: 8px;
  background: #1a1a1a; color: #fff; outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus { border-color: #e74c3c; }
.input-group input::placeholder { color: #555; }

.auth-btn {
  width: 100%; padding: 12px; font-size: 16px; font-weight: bold;
  border: none; border-radius: 8px; cursor: pointer;
  color: #fff; transition: opacity 0.2s;
}
.auth-btn:hover { opacity: 0.9; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#loginBtn { background: linear-gradient(135deg, #e74c3c, #c0392b); }
#registerBtn { background: linear-gradient(135deg, #2ecc71, #27ae60); }

.auth-error {
  color: #e74c3c; font-size: 13px; margin-top: 8px;
  min-height: 20px;
}

.divider {
  display: flex; align-items: center; margin: 16px 0; color: #555;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: #333;
}
.divider span { padding: 0 12px; font-size: 13px; }

/* Guest play */
#guestSection { margin-top: 8px; }
#guestNameInput {
  padding: 10px 16px; font-size: 15px; border: 2px solid #333;
  border-radius: 8px; background: #1a1a1a; color: #fff; outline: none;
  width: 100%; text-align: center; margin-bottom: 10px;
}
#guestNameInput:focus { border-color: #f39c12; }
#guestPlayBtn {
  width: 100%; padding: 10px; font-size: 15px; font-weight: bold;
  border: 2px solid #555; border-radius: 8px; background: transparent;
  color: #888; cursor: pointer; transition: all 0.2s;
}
#guestPlayBtn:hover { border-color: #f39c12; color: #f39c12; }

/* User info when logged in */
#userInfo {
  display: none; margin-bottom: 16px; text-align: left;
  background: #1a1a1a; padding: 14px; border-radius: 8px;
  border: 1px solid #333;
}
#userInfo .welcome {
  font-size: 16px; color: #f39c12; margin-bottom: 8px;
}
#userInfo .stat-row {
  display: flex; justify-content: space-between; padding: 3px 0;
  color: #aaa; font-size: 13px;
}
#userInfo .stat-val { color: #fff; font-weight: bold; }
#logoutBtn {
  margin-top: 10px; padding: 6px 12px; font-size: 12px;
  border: 1px solid #555; border-radius: 4px; background: transparent;
  color: #888; cursor: pointer;
}
#logoutBtn:hover { border-color: #e74c3c; color: #e74c3c; }
#playBtnLoggedIn {
  width: 100%; padding: 14px; font-size: 18px; font-weight: bold;
  border: none; border-radius: 8px; cursor: pointer; color: #fff;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  margin-top: 12px;
}
#playBtnLoggedIn:hover { opacity: 0.9; }

/* HUD */
#minimap-container {
  position: fixed; top: 12px; right: 12px;
  background: rgba(0,0,0,0.5); padding: 4px;
  border-radius: 8px; border: 1px solid rgba(100,180,255,0.3); z-index: 5;
  transition: all 0.3s ease;
}
#minimap-container.hidden { display: none; }
#minimap-container.expanded {
  top: 50%; left: 50%; right: auto;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); padding: 8px;
  border: 2px solid rgba(100,180,255,0.5);
}
#minimap { display: block; border-radius: 6px; }

#pingDisplay {
  position: fixed; top: 12px; left: 12px;
  background: rgba(0,0,0,0.6); color: #0f0; padding: 6px 10px;
  border-radius: 6px; font-size: 12px; font-family: monospace; z-index: 5;
}
#pingDisplay.hidden { display: none; }

#death {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); z-index: 8;
}
#death.hidden { display: none; }
#death div { text-align: center; color: #fff; }
#death h2 { font-size: 36px; color: #e74c3c; margin-bottom: 8px; }
#death p { color: #aaa; }

</style>
</head>
<body>

<div id="menu">
  <div id="menuBox">
    <h1>SHOOTER.IO</h1>
    <p class="subtitle">多人在线射击</p>

    <!-- User info (shown when logged in) -->
    <div id="userInfo">
      <div class="welcome">欢迎回来, <span id="welcomeName"></span></div>
      <div class="stat-row"><span>总击杀</span><span class="stat-val" id="statKills">0</span></div>
      <div class="stat-row"><span>总死亡</span><span class="stat-val" id="statDeaths">0</span></div>
      <div class="stat-row"><span>K/D</span><span class="stat-val" id="statKD">0.00</span></div>
      <div class="stat-row"><span>最高连杀</span><span class="stat-val" id="statStreak">0</span></div>
      <div class="stat-row"><span>游戏场次</span><span class="stat-val" id="statGames">0</span></div>
      <button id="logoutBtn">退出登录</button>
      <button id="playBtnLoggedIn">开始游戏</button>
    </div>

    <!-- Auth section (shown when not logged in) -->
    <div id="authSection" class="auth-section">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">登录</button>
        <button class="auth-tab" id="tabRegister">注册</button>
      </div>

      <div class="auth-form active" id="formLogin">
        <div class="input-group">
          <input type="text" id="loginUsername" placeholder="用户名" maxlength="12" autocomplete="username">
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
        </div>
        <button class="auth-btn" id="loginBtn">登录</button>
        <div class="auth-error" id="loginError"></div>
      </div>

      <div class="auth-form" id="formRegister">
        <div class="input-group">
          <input type="text" id="regUsername" placeholder="用户名 (2-12字符)" maxlength="12" autocomplete="username">
        </div>
        <div class="input-group">
          <input type="password" id="regPassword" placeholder="密码 (至少6位)" autocomplete="new-password">
        </div>
        <div class="input-group">
          <input type="password" id="regPassword2" placeholder="确认密码" autocomplete="new-password">
        </div>
        <button class="auth-btn" id="registerBtn">注册</button>
        <div class="auth-error" id="regError"></div>
      </div>

      <div class="divider"><span>或者</span></div>

      <div id="guestSection">
        <input type="text" id="guestNameInput" placeholder="游客名字" maxlength="12">
        <button id="guestPlayBtn">游客模式</button>
      </div>
    </div>
  </div>
</div>

<div id="minimap-container" class="hidden">
  <canvas id="minimap" width="200" height="150"></canvas>
</div>

<div id="pingDisplay" class="hidden">PING: --</div>

<div id="death" class="hidden">
  <div>
    <h2>你死了</h2>
    <p>等待复活中...</p>
  </div>
</div>


<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
// Preload custom skins
const CUSTOM_SKINS = {
  'TAT': '/skins/tat.png'
};
const skinImages = {};
for (const [name, src] of Object.entries(CUSTOM_SKINS)) {
  const img = new Image();
  img.src = src;
  skinImages[name] = img;
}
</script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const hud = document.getElementById('minimap-container');
const deathScreen = document.getElementById('death');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const pingDisplay = document.getElementById('pingDisplay');

// Auth elements
const authSection = document.getElementById('authSection');
const userInfo = document.getElementById('userInfo');
const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const formLogin = document.getElementById('formLogin');
const formRegister = document.getElementById('formRegister');

let socket;
let myId;
let mapW, mapH;
let authToken = localStorage.getItem('authToken');
let currentUser = null;

let PLAYER_SPEED = 4;
let PLAYER_RADIUS = 18;
let BULLET_SPEED = 12;
let BULLET_LIFE = 60;
let BULLET_RADIUS = 5;
let SHOOT_COOLDOWN = 150;

let camera = { x: 0, y: 0 };
let mouse = { x: 0, y: 0 };
let keys = { up: false, down: false, left: false, right: false };
let playing = false;
let wasAlive = true;

let inputSeq = 0;
let pendingInputs = [];
let localPlayer = null;

let stateBuffer = [];
const INTERP_DELAY = 100;

let localBullets = [];
let localBulletId = 0;
let lastLocalShot = 0;

let serverBullets = [];
let confirmedBulletMap = {};
let serverMobs = {};
let floatingTexts = []; // For kill rewards

// Map data
let iceBlocks = [];
let iceLakes = [];
let borderPoints = [];
let spawnPoint = { x: 0, y: 0 };
let minimapExpanded = false;

// Snowflake particles
const snowflakes = [];
const SNOW_COUNT = 150;
for (let i = 0; i < SNOW_COUNT; i++) {
  snowflakes.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: Math.random() * 3 + 1,
    speed: Math.random() * 1 + 0.3,
    drift: Math.random() * 0.5 - 0.25,
    opacity: Math.random() * 0.6 + 0.3
  });
}

let hitEffects = [];
let ping = 0;
let serverPlayers = {};

// ─── Auth UI ───

tabLogin.onclick = () => {
  tabLogin.classList.add('active'); tabRegister.classList.remove('active');
  formLogin.classList.add('active'); formRegister.classList.remove('active');
};
tabRegister.onclick = () => {
  tabRegister.classList.add('active'); tabLogin.classList.remove('active');
  formRegister.classList.add('active'); formLogin.classList.remove('active');
};

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    document.getElementById('loginBtn').disabled = true;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; return; }
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = data.user;
    showUserInfo(data.user);
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    document.getElementById('loginBtn').disabled = false;
  }
};

document.getElementById('registerBtn').onclick = async () => {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  const errEl = document.getElementById('regError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写所有字段'; return; }
  if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }

  try {
    document.getElementById('registerBtn').disabled = true;
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; return; }
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = data.user;
    showUserInfo(data.user);
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    document.getElementById('registerBtn').disabled = false;
  }
};

document.getElementById('logoutBtn').onclick = () => {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('authToken');
  userInfo.style.display = 'none';
  authSection.style.display = 'block';
};

function showUserInfo(user) {
  authSection.style.display = 'none';
  userInfo.style.display = 'block';
  document.getElementById('welcomeName').textContent = user.username;
  document.getElementById('statKills').textContent = user.stats.kills;
  document.getElementById('statDeaths').textContent = user.stats.deaths;
  const kd = user.stats.deaths > 0 ? (user.stats.kills / user.stats.deaths).toFixed(2) : user.stats.kills.toFixed(2);
  document.getElementById('statKD').textContent = kd;
  document.getElementById('statStreak').textContent = user.stats.bestKillStreak;
  document.getElementById('statGames').textContent = user.stats.gamesPlayed;
}

// Check saved token on load
async function checkAuth() {
  if (!authToken) return;
  try {
    const res = await fetch('/api/auth/profile', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (res.ok) {
      const data = await res.json();
      currentUser = { username: data.username, stats: data.stats };
      showUserInfo(currentUser);
    } else {
      localStorage.removeItem('authToken');
      authToken = null;
    }
  } catch (e) {
    // ignore
  }
}
checkAuth();

// ─── Game Start ───

function startGame(playerName) {
  menu.classList.add('hidden');
  hud.classList.remove('hidden');
  pingDisplay.classList.remove('hidden');
  playing = true;

  socket = io();

  socket.on('init', (data) => {
    myId = data.id;
    mapW = data.mapW;
    mapH = data.mapH;
    PLAYER_SPEED = data.playerSpeed;
    PLAYER_RADIUS = data.playerRadius;
    BULLET_SPEED = data.bulletSpeed;
    BULLET_LIFE = data.bulletLife;
    BULLET_RADIUS = data.bulletRadius;
    SHOOT_COOLDOWN = data.shootCooldown;
    iceBlocks = data.iceBlocks || [];
    iceLakes = data.iceLakes || [];
    borderPoints = data.borderPoints || [];
    spawnPoint = data.spawnPoint || { x: 0, y: 0 };

    // Authenticate if logged in
    if (authToken) {
      socket.emit('auth', authToken);
    }
    socket.emit('setName', playerName);
  });

  socket.on('authSuccess', (data) => {
    // Server confirmed auth
  });

  socket.on('state', (s) => {
    const now = Date.now();
    stateBuffer.push({ time: now, players: s.players, bullets: s.bullets });
    while (stateBuffer.length > 2 && stateBuffer[0].time < now - 1000) {
      stateBuffer.shift();
    }

    serverPlayers = s.players;
    serverBullets = s.bullets;
    serverMobs = s.mobs || {};
    reconcileBullets(s.bullets);

    const me = s.players[myId];
    if (me) {
      if (!me.alive && wasAlive) deathScreen.classList.remove('hidden');
      if (me.alive && !wasAlive) {
        deathScreen.classList.add('hidden');
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
      wasAlive = me.alive;

      if (me.alive && localPlayer) {
        localPlayer.x = me.x;
        localPlayer.y = me.y;
        const serverSeq = me.seq || 0;
        pendingInputs = pendingInputs.filter(inp => inp.seq > serverSeq);
        for (const inp of pendingInputs) {
          applyMovement(localPlayer, inp.keys);
        }
      } else if (me.alive && !localPlayer) {
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
    }
  });

  socket.on('shootConfirm', (data) => {
    if (data.clientId != null) confirmedBulletMap[data.clientId] = data.serverId;
  });

  socket.on('hits', (events) => {
    for (const hit of events) {
      hitEffects.push({ x: hit.x, y: hit.y, time: 20, killed: hit.killed });
      if (serverPlayers[hit.targetId]) serverPlayers[hit.targetId].hp = hit.hp;
    }
  });

  socket.on('mobKillReward', (data) => {
    floatingTexts.push({
      x: data.x, y: data.y,
      text: `+${data.heal}HP`,
      color: '#2ecc71',
      time: 60
    });
    floatingTexts.push({
      x: data.x, y: data.y - 20,
      text: `击杀 ${data.mobName} +${data.xp}`,
      color: '#f39c12',
      time: 60
    });
  });

  socket.on('pong_check', (clientTime) => {
    ping = Date.now() - clientTime;
    const color = ping < 80 ? '#0f0' : ping < 150 ? '#ff0' : '#f00';
    pingDisplay.style.color = color;
    pingDisplay.textContent = `PING: ${ping}ms`;
  });

  setInterval(() => { if (socket) socket.emit('ping_check', Date.now()); }, 2000);
}

// Play button handlers
document.getElementById('playBtnLoggedIn').onclick = () => {
  startGame(currentUser ? currentUser.username : 'Player');
};
document.getElementById('guestPlayBtn').onclick = () => {
  const name = document.getElementById('guestNameInput').value.trim() || 'Player';
  startGame(name);
};
document.getElementById('guestNameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const name = document.getElementById('guestNameInput').value.trim() || 'Player';
    startGame(name);
  }
});

// Enter key on auth forms
document.getElementById('loginPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('regPassword2').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('registerBtn').click();
});

// ─── Game Logic ───

function reconcileBullets(sBullets) {
  const serverIds = new Set(sBullets.map(b => b.id));
  localBullets = localBullets.filter(lb => {
    const serverId = confirmedBulletMap[lb.id];
    if (serverId != null && serverIds.has(serverId)) return false;
    if (serverId != null && !serverIds.has(serverId)) {
      delete confirmedBulletMap[lb.id];
      return false;
    }
    lb.life--;
    return lb.life > 0;
  });
}

// Client-side border check (same ray casting as server)
function clientIsInsideBorder(x, y) {
  if (borderPoints.length < 3) return true;
  let inside = false;
  const n = borderPoints.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = borderPoints[i].x, yi = borderPoints[i].y;
    const xj = borderPoints[j].x, yj = borderPoints[j].y;
    if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// Client-side ice block collision (same as server)
function clientCollidesBlock(x, y, radius) {
  for (const b of iceBlocks) {
    const dx = x - b.x, dy = y - b.y;
    if (dx * dx + dy * dy < (radius + b.r) * (radius + b.r)) return true;
  }
  return false;
}

function clientCanMove(x, y) {
  return clientIsInsideBorder(x, y) && !clientCollidesBlock(x, y, PLAYER_RADIUS);
}

function applyMovement(obj, inputKeys) {
  let dx = 0, dy = 0;
  if (inputKeys.up) dy -= 1;
  if (inputKeys.down) dy += 1;
  if (inputKeys.left) dx -= 1;
  if (inputKeys.right) dx += 1;
  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    const mvx = (dx / len) * PLAYER_SPEED;
    const mvy = (dy / len) * PLAYER_SPEED;
    const newX = obj.x + mvx;
    const newY = obj.y + mvy;

    if (clientCanMove(newX, newY)) {
      obj.x = newX;
      obj.y = newY;
    } else if (clientCanMove(newX, obj.y)) {
      obj.x = newX;
    } else if (clientCanMove(obj.x, newY)) {
      obj.y = newY;
    }
    // else: both directions blocked, don't move
  }
  obj.x = Math.max(PLAYER_RADIUS, Math.min(mapW - PLAYER_RADIUS, obj.x));
  obj.y = Math.max(PLAYER_RADIUS, Math.min(mapH - PLAYER_RADIUS, obj.y));
}

window.addEventListener('keydown', (e) => {
  if (!playing) return;
  if (e.key === 'w' || e.key === 'W') keys.up = true;
  if (e.key === 's' || e.key === 'S') keys.down = true;
  if (e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === 'm' || e.key === 'M') {
    minimapExpanded = !minimapExpanded;
    const container = document.getElementById('minimap-container');
    if (minimapExpanded) {
      minimapCanvas.width = 500;
      minimapCanvas.height = 375;
      container.classList.add('expanded');
    } else {
      minimapCanvas.width = 200;
      minimapCanvas.height = 150;
      container.classList.remove('expanded');
    }
  }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'w' || e.key === 'W') keys.up = false;
  if (e.key === 's' || e.key === 'S') keys.down = false;
  if (e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'd' || e.key === 'D') keys.right = false;
});
window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

let shooting = false;
window.addEventListener('mousedown', (e) => { if (e.button === 0) shooting = true; });
window.addEventListener('mouseup', (e) => { if (e.button === 0) shooting = false; });

function getAngle() {
  return Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2);
}

function tryShoot() {
  if (!socket || !playing) return;
  const me = serverPlayers[myId];
  if (!me || !me.alive || !localPlayer) return;
  const now = Date.now();
  if (now - lastLocalShot < SHOOT_COOLDOWN) return;
  lastLocalShot = now;
  const angle = getAngle();
  const cId = localBulletId++;
  localBullets.push({
    id: cId,
    x: localPlayer.x + Math.cos(angle) * (PLAYER_RADIUS + 8),
    y: localPlayer.y + Math.sin(angle) * (PLAYER_RADIUS + 8),
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    life: BULLET_LIFE,
    color: me.color
  });
  socket.emit('shoot', { angle, clientId: cId });
}

function sendInput() {
  if (!socket || !playing) return;
  const me = serverPlayers[myId];
  if (!me || !me.alive) return;
  inputSeq++;
  socket.emit('input', { keys: { ...keys }, angle: getAngle(), seq: inputSeq });
  if (localPlayer) {
    applyMovement(localPlayer, keys);
    pendingInputs.push({ seq: inputSeq, keys: { ...keys } });
    if (pendingInputs.length > 120) pendingInputs.shift();
  }
  if (shooting) tryShoot();
}
setInterval(sendInput, 1000 / 30);

function getInterpolatedPlayers() {
  const now = Date.now();
  const renderTime = now - INTERP_DELAY;
  const result = {};
  if (stateBuffer.length < 2) {
    for (const id in serverPlayers) result[id] = { ...serverPlayers[id] };
    return result;
  }
  let prev = stateBuffer[0], next = stateBuffer[1];
  for (let i = 0; i < stateBuffer.length - 1; i++) {
    if (stateBuffer[i].time <= renderTime && stateBuffer[i + 1].time >= renderTime) {
      prev = stateBuffer[i]; next = stateBuffer[i + 1]; break;
    }
  }
  if (renderTime > stateBuffer[stateBuffer.length - 1].time) {
    prev = stateBuffer[stateBuffer.length - 2] || stateBuffer[stateBuffer.length - 1];
    next = stateBuffer[stateBuffer.length - 1];
  }
  const total = next.time - prev.time;
  const t = total > 0 ? Math.max(0, Math.min(1, (renderTime - prev.time) / total)) : 1;
  const allIds = new Set([...Object.keys(prev.players), ...Object.keys(next.players)]);
  for (const id of allIds) {
    const p0 = prev.players[id]; const p1 = next.players[id];
    if (p0 && p1) {
      result[id] = { ...p1, x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t, angle: p0.angle + (p1.angle - p0.angle) * t };
    } else result[id] = { ...(p1 || p0) };
  }
  return result;
}

function getRenderBullets() {
  const all = [];
  const confirmed = new Set(Object.values(confirmedBulletMap));
  for (const b of serverBullets) { if (!confirmed.has(b.id)) all.push({ x: b.x, y: b.y, color: b.color }); }
  for (const lb of localBullets) all.push({ x: lb.x, y: lb.y, color: lb.color });
  return all;
}

function updateLocalBullets() {
  for (const b of localBullets) { b.x += b.vx; b.y += b.vy; }
  for (let i = localBullets.length - 1; i >= 0; i--) {
    const b = localBullets[i];
    if (b.x < 0 || b.x > mapW || b.y < 0 || b.y > mapH) localBullets.splice(i, 1);
  }
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ─── Rendering ───

function drawBackground() {
  // Snow ground gradient
  const grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
  grd.addColorStop(0, '#d6e8f0');
  grd.addColorStop(1, '#b0c8d8');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawGrid() {
  // Grid removed for cleaner look
}

function drawBorder() {
  if (borderPoints.length < 3) return;
  ctx.save();
  const bp = borderPoints;

  // Build the polygon path (straight lines matching server collision)
  function traceBorderPath() {
    ctx.moveTo(bp[0].x - camera.x, bp[0].y - camera.y);
    for (let i = 1; i < bp.length; i++) {
      ctx.lineTo(bp[i].x - camera.x, bp[i].y - camera.y);
    }
    ctx.closePath();
  }

  // Draw the area outside the border as darker
  ctx.fillStyle = 'rgba(40, 65, 85, 0.45)';
  ctx.beginPath();
  ctx.rect(-camera.x - 500, -camera.y - 500, mapW + 1000, mapH + 1000);
  // Cut out playable area (reverse winding)
  ctx.moveTo(bp[0].x - camera.x, bp[0].y - camera.y);
  for (let i = bp.length - 1; i >= 0; i--) {
    ctx.lineTo(bp[i].x - camera.x, bp[i].y - camera.y);
  }
  ctx.closePath();
  ctx.fill();

  // Draw border line - straight segments matching actual collision
  ctx.beginPath();
  traceBorderPath();

  // Outer glow
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(79, 195, 247, 0.8)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Main line
  ctx.shadowBlur = 0;
  ctx.beginPath();
  traceBorderPath();
  ctx.strokeStyle = 'rgba(130, 220, 255, 0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner soft glow
  ctx.beginPath();
  traceBorderPath();
  ctx.strokeStyle = 'rgba(200, 240, 255, 0.3)';
  ctx.lineWidth = 6;
  ctx.stroke();

  ctx.restore();
}

function drawIceLakes() {
  for (const lake of iceLakes) {
    const sx = lake.x - camera.x, sy = lake.y - camera.y;
    if (sx + lake.r < -50 || sx - lake.r > canvas.width + 50 || sy + lake.r < -50 || sy - lake.r > canvas.height + 50) continue;

    // Frozen lake surface
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, lake.r);
    grd.addColorStop(0, 'rgba(180, 225, 255, 0.5)');
    grd.addColorStop(0.7, 'rgba(140, 200, 240, 0.35)');
    grd.addColorStop(1, 'rgba(100, 180, 230, 0.1)');
    ctx.beginPath();
    ctx.arc(sx, sy, lake.r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Ice cracks
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 + lake.x * 0.01;
      const len = lake.r * (0.4 + Math.sin(lake.y + i) * 0.3);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(angle) * len, sy + Math.sin(angle) * len);
      ctx.stroke();
    }

    // Rim highlight
    ctx.beginPath();
    ctx.arc(sx, sy, lake.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 230, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawIceBlocks() {
  for (const block of iceBlocks) {
    const sx = block.x - camera.x, sy = block.y - camera.y;
    const r = block.r || 40;
    if (sx + r < -10 || sx - r > canvas.width + 10 || sy + r < -10 || sy - r > canvas.height + 10) continue;

    ctx.save();
    ctx.translate(sx, sy);

    // Draw irregular shape using pre-generated vertices
    const shape = block.shape;
    if (shape && shape.length > 0) {
      ctx.beginPath();
      ctx.moveTo(shape[0].x, shape[0].y);
      for (let i = 1; i < shape.length; i++) {
        const prev = shape[i - 1];
        const curr = shape[i];
        const cpx = (prev.x + curr.x) / 2;
        const cpy = (prev.y + curr.y) / 2;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      const last = shape[shape.length - 1];
      const first = shape[0];
      ctx.quadraticCurveTo(last.x, last.y, (last.x + first.x) / 2, (last.y + first.y) / 2);
      ctx.closePath();

      // Ice gradient fill
      const grd = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r);
      grd.addColorStop(0, 'rgba(210, 240, 255, 0.95)');
      grd.addColorStop(0.4, 'rgba(160, 215, 245, 0.9)');
      grd.addColorStop(0.8, 'rgba(100, 180, 225, 0.85)');
      grd.addColorStop(1, 'rgba(70, 150, 200, 0.8)');
      ctx.fillStyle = grd;
      ctx.fill();

      // Edge outline
      ctx.strokeStyle = 'rgba(80, 160, 210, 0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner highlight (top-left shine)
      ctx.beginPath();
      ctx.ellipse(-r * 0.15, -r * 0.2, r * 0.35, r * 0.2, -0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.fill();

      // Small sparkle dots
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath();
      ctx.arc(-r * 0.25, -r * 0.3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(r * 0.2, r * 0.1, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Inner cracks
      ctx.strokeStyle = 'rgba(80, 160, 220, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-r * 0.1, -r * 0.1);
      ctx.lineTo(r * 0.3, r * 0.2);
      ctx.lineTo(r * 0.1, r * 0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(r * 0.3, r * 0.2);
      ctx.lineTo(r * 0.5, 0);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawSnowflakes() {
  for (const s of snowflakes) {
    // Snow moves in screen space
    s.y += s.speed;
    s.x += s.drift;
    if (s.y > canvas.height + 10) { s.y = -10; s.x = Math.random() * canvas.width; }
    if (s.x > canvas.width + 10) s.x = -10;
    if (s.x < -10) s.x = canvas.width + 10;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
    ctx.fill();
  }
}

function drawPlayer(p, isMe) {
  const sx = p.x - camera.x, sy = p.y - camera.y;
  if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;
  ctx.save(); ctx.translate(sx, sy);

  const skin = skinImages[p.name];
  const hasSkin = skin && skin.complete && skin.naturalWidth > 0 && p.alive;

  if (hasSkin) {
    // Draw custom skin - full character, no clipping
    const size = 70;
    // Gun still rotates
    ctx.save(); ctx.rotate(p.angle);
    ctx.fillStyle = '#888'; ctx.fillRect(24, -3, 18, 6);
    ctx.restore();
    // Draw full character image
    if (!p.alive) ctx.globalAlpha = 0.3;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(skin, -size/2, -size/2, size, size);
    ctx.globalAlpha = 1;
  } else {
    // Default circle player
    ctx.save(); ctx.rotate(p.angle);
    ctx.fillStyle = '#888'; ctx.fillRect(10, -4, 20, 8);
    ctx.restore();
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fillStyle = p.alive ? p.color : '#333'; ctx.fill();
    ctx.strokeStyle = isMe ? '#fff' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isMe ? 3 : 1; ctx.stroke();
  }

  // hp bar
  if (p.alive) {
    const bw = hasSkin ? 46 : 36;
    const barY = hasSkin ? -42 : -34;
    ctx.fillStyle = '#333'; ctx.fillRect(-bw/2, barY, bw, 5);
    ctx.fillStyle = p.hp > 50 ? '#2ecc71' : p.hp > 25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(-bw/2, barY, bw * (p.hp / 100), 5);
  }
  // name
  ctx.fillStyle = '#fff'; ctx.font = hasSkin ? 'bold 13px sans-serif' : '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, hasSkin ? 46 : 34);
  ctx.restore();
}

function drawBullet(b) {
  const sx = b.x - camera.x, sy = b.y - camera.y;
  if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) return;
  // Glow
  ctx.save();
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fillStyle = b.color; ctx.fill();
  ctx.restore();
  // Core
  ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function drawHitEffects() {
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    const h = hitEffects[i];
    const sx = h.x - camera.x, sy = h.y - camera.y;
    const progress = 1 - h.time / 20;
    ctx.save(); ctx.translate(sx, sy); ctx.globalAlpha = 1 - progress;
    if (h.killed) {
      const r = 20 + progress * 40;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#f39c12'; ctx.globalAlpha = (1 - progress) * 0.5; ctx.fill();
    } else {
      const r = 8 + progress * 15;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.restore(); ctx.globalAlpha = 1;
    h.time--;
    if (h.time <= 0) hitEffects.splice(i, 1);
  }
}

function drawIceLeg(ctx, s, len) {
  const grad = ctx.createLinearGradient(0, 0, 0, s * len);
  grad.addColorStop(0, 'rgba(60, 200, 240, 0.85)');
  grad.addColorStop(1, 'rgba(100, 220, 255, 0.6)');
  ctx.fillStyle = grad;
  ctx.strokeStyle = 'rgba(170, 240, 255, 0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-s * 2.5, 0);
  ctx.lineTo(-s * 1.5, s * len * 0.5);
  ctx.lineTo(-s * 2, s * len);
  ctx.lineTo(s * 1, s * len);
  ctx.lineTo(s * 1.5, s * len * 0.5);
  ctx.lineTo(s * 2.5, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Crack on leg
  ctx.strokeStyle = 'rgba(200, 250, 255, 0.3)';
  ctx.beginPath();
  ctx.moveTo(0, s * 2);
  ctx.lineTo(-s, s * len * 0.6);
  ctx.stroke();
  // Claw
  ctx.fillStyle = 'rgba(180, 250, 255, 0.7)';
  ctx.beginPath();
  ctx.moveTo(-s * 1.5, s * len);
  ctx.lineTo(-s * 2.5, s * (len + 3));
  ctx.lineTo(-s * 0.5, s * len);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s * 0.5, s * len);
  ctx.lineTo(s * 1.5, s * (len + 3));
  ctx.lineTo(s * 2, s * len);
  ctx.fill();
}

function drawMob(m) {
  const sx = m.x - camera.x, sy = m.y - camera.y;
  if (sx < -150 || sx > canvas.width + 150 || sy < -150 || sy > canvas.height + 150) return;

  ctx.save();
  ctx.translate(sx, sy);

  const t = Date.now() / 1000;

  if (m.type === 'wolf' || m.type === 'wolf_alpha') {
    const isAlpha = m.type === 'wolf_alpha';
    // === Ice Crystal Wolf ===
    const s = m.radius / 14; // scale factor (base radius 14)
    const isChasing = m.state === 'chase';
    const walkCycle = isChasing ? Math.sin(t * 12) : Math.sin(t * 3);
    const breathe = Math.sin(t * 2) * 0.03;

    ctx.save();
    ctx.rotate(m.angle);
    ctx.scale(1 + breathe, 1 - breathe * 0.5);

    // Glow aura
    const auraGrad = ctx.createRadialGradient(0, 0, s * 5, 0, 0, s * 35);
    auraGrad.addColorStop(0, isAlpha ? 'rgba(130, 100, 255, 0.3)' : 'rgba(100, 220, 255, 0.25)');
    auraGrad.addColorStop(1, isAlpha ? 'rgba(130, 100, 255, 0)' : 'rgba(100, 220, 255, 0)');
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.arc(0, 0, s * 35, 0, Math.PI * 2);
    ctx.fill();

    // Tail (ice shards trailing behind)
    ctx.save();
    ctx.translate(-s * 22, 0);
    const tailWag = Math.sin(t * (isChasing ? 8 : 3)) * 0.3;
    ctx.rotate(tailWag);
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = `rgba(120, 210, 255, ${0.6 - i * 0.15})`;
      ctx.strokeStyle = 'rgba(180, 240, 255, 0.6)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-s * (3 + i * 4), -s * (1 + i));
      ctx.lineTo(-s * (8 + i * 5), s * (i % 2 === 0 ? -3 : 3) - i);
      ctx.lineTo(-s * (3 + i * 4), s * (1 + i));
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();

    // Back legs
    const legAngle1 = isChasing ? Math.sin(t * 12) * 0.6 : Math.sin(t * 3) * 0.15;
    const legAngle2 = isChasing ? Math.sin(t * 12 + Math.PI) * 0.6 : Math.sin(t * 3 + Math.PI) * 0.15;
    ctx.save();
    // Back left leg
    ctx.save();
    ctx.translate(-s * 10, -s * 6);
    ctx.rotate(legAngle1);
    drawIceLeg(ctx, s, 16);
    ctx.restore();
    // Back right leg
    ctx.save();
    ctx.translate(-s * 10, s * 6);
    ctx.rotate(legAngle2);
    drawIceLeg(ctx, s, 16);
    ctx.restore();
    ctx.restore();

    // Front legs
    ctx.save();
    // Front left
    ctx.save();
    ctx.translate(s * 6, -s * 6);
    ctx.rotate(legAngle2 * 0.8);
    drawIceLeg(ctx, s, 14);
    ctx.restore();
    // Front right
    ctx.save();
    ctx.translate(s * 6, s * 6);
    ctx.rotate(legAngle1 * 0.8);
    drawIceLeg(ctx, s, 14);
    ctx.restore();
    ctx.restore();

    // Main body - ice crystal segments
    const bodyGrad = ctx.createLinearGradient(-s * 15, -s * 8, s * 12, s * 8);
    if (isAlpha) {
      bodyGrad.addColorStop(0, '#5535d0');
      bodyGrad.addColorStop(0.3, '#7755ee');
      bodyGrad.addColorStop(0.6, '#5540d5');
      bodyGrad.addColorStop(1, '#3828b8');
    } else {
      bodyGrad.addColorStop(0, '#3ad4f5');
      bodyGrad.addColorStop(0.3, '#6be8ff');
      bodyGrad.addColorStop(0.6, '#40d0f0');
      bodyGrad.addColorStop(1, '#28a8d8');
    }
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = 'rgba(180, 240, 255, 0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(s * 12, 0);
    ctx.lineTo(s * 8, -s * 7);
    ctx.lineTo(s * 2, -s * 9);
    ctx.lineTo(-s * 8, -s * 8);
    ctx.lineTo(-s * 16, -s * 5);
    ctx.lineTo(-s * 18, 0);
    ctx.lineTo(-s * 16, s * 5);
    ctx.lineTo(-s * 8, s * 8);
    ctx.lineTo(s * 2, s * 9);
    ctx.lineTo(s * 8, s * 7);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Ice crack lines on body
    ctx.strokeStyle = 'rgba(200, 250, 255, 0.4)';
    ctx.lineWidth = 0.8;
    const cracks = [
      [[-s*5,-s*7],[s*2,-s*2],[-s*2,s*4]],
      [[s*6,-s*5],[s*1,-s*1],[s*5,s*4]],
      [[-s*12,-s*3],[-s*6,0],[-s*10,s*5]],
      [[-s*3,s*6],[s*4,s*2],[s*8,s*5]]
    ];
    for (const crack of cracks) {
      ctx.beginPath();
      ctx.moveTo(crack[0][0], crack[0][1]);
      for (let i = 1; i < crack.length; i++) ctx.lineTo(crack[i][0], crack[i][1]);
      ctx.stroke();
    }

    // Ice spikes on back
    const spikes = [
      { x: -s * 10, h: s * 8, w: s * 3 },
      { x: -s * 5, h: s * 12, w: s * 4 },
      { x: 0, h: s * 14, w: s * 4.5 },
      { x: s * 4, h: s * 10, w: s * 3.5 },
      { x: s * 7, h: s * 6, w: s * 2.5 }
    ];
    for (const spike of spikes) {
      const spikeGrad = ctx.createLinearGradient(spike.x, -s * 6, spike.x, -s * 6 - spike.h);
      spikeGrad.addColorStop(0, 'rgba(60, 210, 250, 0.9)');
      spikeGrad.addColorStop(0.5, 'rgba(120, 230, 255, 0.85)');
      spikeGrad.addColorStop(1, 'rgba(200, 250, 255, 0.6)');
      ctx.fillStyle = spikeGrad;
      ctx.strokeStyle = 'rgba(180, 245, 255, 0.6)';
      ctx.lineWidth = 0.8;
      const wobble = Math.sin(t * 2 + spike.x * 0.1) * s * 0.5;
      ctx.beginPath();
      ctx.moveTo(spike.x - spike.w, -s * 6);
      ctx.lineTo(spike.x + wobble, -s * 6 - spike.h);
      ctx.lineTo(spike.x + spike.w, -s * 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Head
    ctx.save();
    ctx.translate(s * 12, 0);
    const headGrad = ctx.createRadialGradient(-s*2, -s*1, 0, 0, 0, s * 10);
    if (isAlpha) {
      headGrad.addColorStop(0, '#9070ff');
      headGrad.addColorStop(0.5, '#6040d0');
      headGrad.addColorStop(1, '#4028a0');
    } else {
      headGrad.addColorStop(0, '#80e8ff');
      headGrad.addColorStop(0.5, '#45c8e8');
      headGrad.addColorStop(1, '#2898c0');
    }
    ctx.fillStyle = headGrad;
    ctx.strokeStyle = 'rgba(180, 240, 255, 0.7)';
    ctx.lineWidth = 1.2;
    // Angular wolf head shape
    ctx.beginPath();
    ctx.moveTo(s * 10, 0); // snout tip
    ctx.lineTo(s * 5, -s * 4);
    ctx.lineTo(s * 1, -s * 6);
    // Left ear (ice spike)
    ctx.lineTo(-s * 1, -s * 12);
    ctx.lineTo(-s * 3, -s * 6);
    ctx.lineTo(-s * 6, -s * 5);
    ctx.lineTo(-s * 6, s * 5);
    // Right ear
    ctx.lineTo(-s * 3, s * 6);
    ctx.lineTo(-s * 1, s * 12);
    ctx.lineTo(s * 1, s * 6);
    ctx.lineTo(s * 5, s * 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Head cracks
    ctx.strokeStyle = 'rgba(200, 250, 255, 0.35)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(s * 3, -s * 4);
    ctx.lineTo(0, -s * 1);
    ctx.lineTo(s * 2, s * 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 3, -s * 3);
    ctx.lineTo(-s * 1, s * 1);
    ctx.stroke();

    // Jaw / mouth line
    ctx.strokeStyle = 'rgba(20, 80, 120, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s * 10, 0);
    ctx.lineTo(s * 4, s * 1);
    ctx.lineTo(s * 1, 0);
    ctx.stroke();

    // Icicle fangs
    if (isChasing) {
      ctx.fillStyle = 'rgba(220, 250, 255, 0.9)';
      ctx.beginPath();
      ctx.moveTo(s * 8, s * 1);
      ctx.lineTo(s * 7, s * 4);
      ctx.lineTo(s * 6, s * 1);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 5, s * 1);
      ctx.lineTo(s * 4.5, s * 3);
      ctx.lineTo(s * 3.5, s * 0.5);
      ctx.fill();
    }

    // Eyes - glowing cyan
    const eyeGlow = isChasing ? 15 : 8 + Math.sin(t * 3) * 3;
    ctx.shadowColor = isChasing ? '#ff4444' : '#00ffff';
    ctx.shadowBlur = eyeGlow;
    ctx.fillStyle = isChasing ? '#ff3333' : '#00eeff';
    ctx.beginPath();
    ctx.ellipse(s * 3, -s * 2.5, s * 2, s * 1.2, 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 3, s * 2.5, s * 2, s * 1.2, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Eye highlights
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s * 3.5, -s * 2.5, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 3.5, s * 2.5, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore(); // head

    // Ice particle effects when chasing
    if (isChasing) {
      for (let i = 0; i < 5; i++) {
        const px = -s * 15 + Math.sin(t * 5 + i * 1.3) * s * 8;
        const py = Math.cos(t * 4 + i * 1.7) * s * 10;
        const ps = s * (1 + Math.random() * 1.5);
        ctx.fillStyle = `rgba(180, 240, 255, ${0.3 + Math.sin(t * 3 + i) * 0.2})`;
        ctx.fillRect(px - ps/2, py - ps/2, ps, ps);
      }
    }

    ctx.restore(); // main rotation
  } else if (m.type === 'golem') {
    // Ice golem - large crystal shape
    ctx.save();
    // Body - irregular crystal
    const sides = 7;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
      const vary = i % 2 === 0 ? 1.0 : 0.8;
      const px = Math.cos(angle) * m.radius * vary;
      const py = Math.sin(angle) * m.radius * vary;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    const grd = ctx.createRadialGradient(-5, -5, 0, 0, 0, m.radius);
    grd.addColorStop(0, 'rgba(180, 220, 255, 0.95)');
    grd.addColorStop(0.6, 'rgba(80, 160, 220, 0.9)');
    grd.addColorStop(1, 'rgba(40, 100, 180, 0.85)');
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.strokeStyle = '#4488bb';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Inner glow
    ctx.beginPath();
    ctx.arc(0, -5, m.radius * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 235, 255, 0.5)';
    ctx.fill();
    // Eyes
    ctx.save();
    ctx.rotate(m.angle);
    ctx.fillStyle = '#aaeeff';
    ctx.shadowColor = '#aaeeff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(m.radius * 0.35, -6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(m.radius * 0.35, 6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();
  } else if (m.type === 'frost_wyrm') {
    // Frost Dragon/Wyrm - large serpentine body
    const s = m.radius / 35;
    const t2 = t;
    ctx.save();
    ctx.rotate(m.angle);
    // Body segments (serpentine)
    for (let i = 4; i >= 0; i--) {
      const segX = -s * i * 14;
      const segY = Math.sin(t2 * 3 + i * 0.8) * s * 6;
      const segR = s * (16 - i * 1.5);
      const grad = ctx.createRadialGradient(segX, segY, 0, segX, segY, segR);
      grad.addColorStop(0, 'rgba(60, 100, 200, 0.9)');
      grad.addColorStop(0.7, 'rgba(30, 60, 150, 0.85)');
      grad.addColorStop(1, 'rgba(20, 40, 120, 0.7)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(segX, segY, segR, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(100, 150, 255, 0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    // Head
    ctx.fillStyle = '#2855bb';
    ctx.beginPath();
    ctx.moveTo(s * 20, 0);
    ctx.lineTo(s * 8, -s * 12);
    ctx.lineTo(-s * 5, -s * 10);
    ctx.lineTo(-s * 8, 0);
    ctx.lineTo(-s * 5, s * 10);
    ctx.lineTo(s * 8, s * 12);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(100, 160, 255, 0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Horns
    ctx.fillStyle = 'rgba(120, 170, 255, 0.8)';
    ctx.beginPath();
    ctx.moveTo(s * 2, -s * 10);
    ctx.lineTo(-s * 4, -s * 20);
    ctx.lineTo(-s * 2, -s * 9);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s * 2, s * 10);
    ctx.lineTo(-s * 4, s * 20);
    ctx.lineTo(-s * 2, s * 9);
    ctx.fill();
    // Eyes
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff2222';
    ctx.beginPath();
    ctx.ellipse(s * 8, -s * 5, s * 3, s * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 8, s * 5, s * 3, s * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  } else if (m.type === 'ice_elemental') {
    // Ice Elemental - swirling ice energy
    const s = m.radius / 24;
    ctx.save();
    // Swirling particles
    for (let i = 0; i < 8; i++) {
      const angle = t * 2 + (i / 8) * Math.PI * 2;
      const dist = s * (10 + Math.sin(t * 3 + i) * 4);
      const px = Math.cos(angle) * dist;
      const py = Math.sin(angle) * dist;
      const ps = s * (3 + Math.sin(t * 4 + i * 2) * 1.5);
      ctx.fillStyle = `rgba(80, 140, 255, ${0.4 + Math.sin(t * 2 + i) * 0.2})`;
      ctx.beginPath();
      ctx.arc(px, py, ps, 0, Math.PI * 2);
      ctx.fill();
    }
    // Core
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 14);
    coreGrad.addColorStop(0, 'rgba(150, 200, 255, 0.9)');
    coreGrad.addColorStop(0.4, 'rgba(60, 120, 220, 0.8)');
    coreGrad.addColorStop(0.8, 'rgba(30, 60, 180, 0.6)');
    coreGrad.addColorStop(1, 'rgba(20, 40, 150, 0.2)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(0, 0, s * 14, 0, Math.PI * 2);
    ctx.fill();
    // Inner crystal
    ctx.fillStyle = 'rgba(180, 220, 255, 0.7)';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = t * 0.5 + (i / 6) * Math.PI * 2;
      const r = s * (i % 2 === 0 ? 8 : 5);
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(200, 240, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Eyes (in direction of angle)
    ctx.save();
    ctx.rotate(m.angle);
    ctx.shadowColor = '#aaeeff';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ccffff';
    ctx.beginPath();
    ctx.arc(s * 5, -s * 3, s * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 5, s * 3, s * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.restore();
  }

  // HP bar
  const barW = m.radius * 2.2;
  const hpRatio = m.hp / m.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(-barW / 2, -m.radius - 14, barW, 5);
  ctx.fillStyle = hpRatio > 0.5 ? '#2ecc71' : hpRatio > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(-barW / 2, -m.radius - 14, barW * hpRatio, 5);

  // Name (color by zone)
  const zoneColors = { 1: '#ccddee', 2: '#aabbdd', 3: '#ff8888' };
  ctx.fillStyle = zoneColors[m.zone] || '#ccddee';
  ctx.font = (m.zone === 3 ? 'bold ' : '') + '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(m.name, 0, m.radius + 16);

  ctx.restore();
}

function drawFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    const sx = ft.x - camera.x, sy = ft.y - camera.y;
    const progress = 1 - ft.time / 60;
    ctx.save();
    ctx.globalAlpha = 1 - progress;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, sx, sy - progress * 40);
    ctx.restore();
    ft.time--;
    if (ft.time <= 0) floatingTexts.splice(i, 1);
  }
}

function drawMinimap() {
  const mw = minimapCanvas.width, mh = minimapCanvas.height;
  const scaleX = mw / mapW, scaleY = mh / mapH;

  // Background
  minimapCtx.fillStyle = 'rgba(20, 35, 50, 0.85)';
  minimapCtx.fillRect(0, 0, mw, mh);

  // Draw border shape
  if (borderPoints.length > 2) {
    minimapCtx.beginPath();
    minimapCtx.moveTo(borderPoints[0].x * scaleX, borderPoints[0].y * scaleY);
    for (let i = 1; i < borderPoints.length; i++) {
      minimapCtx.lineTo(borderPoints[i].x * scaleX, borderPoints[i].y * scaleY);
    }
    minimapCtx.closePath();
    minimapCtx.fillStyle = 'rgba(60, 90, 120, 0.6)';
    minimapCtx.fill();
    minimapCtx.strokeStyle = 'rgba(100, 180, 255, 0.5)';
    minimapCtx.lineWidth = 1;
    minimapCtx.stroke();
  }

  // Draw other players
  for (const id in serverPlayers) {
    if (id === myId) continue;
    const p = serverPlayers[id];
    if (!p.alive) continue;
    minimapCtx.fillStyle = p.color || '#3498db';
    minimapCtx.beginPath();
    minimapCtx.arc(p.x * scaleX, p.y * scaleY, 3, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // Draw spawn point marker
  minimapCtx.strokeStyle = '#ffdd44';
  minimapCtx.lineWidth = minimapExpanded ? 2 : 1.5;
  const spx = spawnPoint.x * scaleX, spy = spawnPoint.y * scaleY;
  const sr = minimapExpanded ? 10 : 5;
  minimapCtx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + (i * 4 * Math.PI) / 5;
    const x = spx + Math.cos(a) * sr, y = spy + Math.sin(a) * sr;
    if (i === 0) minimapCtx.moveTo(x, y); else minimapCtx.lineTo(x, y);
  }
  minimapCtx.closePath();
  minimapCtx.stroke();

  // Draw self (blinking)
  const me = serverPlayers[myId];
  const pos = localPlayer || (me ? { x: me.x, y: me.y } : null);
  if (pos) {
    const px = pos.x * scaleX, py = pos.y * scaleY;
    // View cone
    minimapCtx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    minimapCtx.beginPath();
    minimapCtx.moveTo(px, py);
    const viewW = canvas.width * scaleX / 2, viewH = canvas.height * scaleY / 2;
    minimapCtx.rect(px - viewW, py - viewH, viewW * 2, viewH * 2);
    minimapCtx.fill();
    // Player dot
    const blink = Math.sin(Date.now() / 200) > 0;
    minimapCtx.fillStyle = blink ? '#ffffff' : '#ffee00';
    minimapCtx.beginPath();
    minimapCtx.arc(px, py, 3.5, 0, Math.PI * 2);
    minimapCtx.fill();
    minimapCtx.strokeStyle = '#000';
    minimapCtx.lineWidth = 0.8;
    minimapCtx.stroke();
  }
}

function render() {
  drawBackground();
  const me = serverPlayers[myId];
  const rp = localPlayer || (me ? { x: me.x, y: me.y } : null);
  if (rp) { camera.x = rp.x - canvas.width / 2; camera.y = rp.y - canvas.height / 2; }
  drawGrid(); drawBorder();
  drawIceLakes();
  drawIceBlocks();
  updateLocalBullets();
  for (const b of getRenderBullets()) drawBullet(b);
  drawHitEffects();
  // Draw mobs
  for (const id in serverMobs) drawMob(serverMobs[id]);
  drawFloatingTexts();
  const interp = getInterpolatedPlayers();
  for (const id in interp) { if (id !== myId) drawPlayer(interp[id], false); }
  if (me && localPlayer) {
    drawPlayer({ ...me, x: localPlayer.x, y: localPlayer.y, angle: getAngle() }, true);
  } else if (me) drawPlayer(me, true);
  drawMinimap();
  drawSnowflakes();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
