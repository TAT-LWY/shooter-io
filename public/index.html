<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooter.IO</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}
canvas { display: block; cursor: crosshair; }

#menu {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}
#menu.hidden { display: none; }
#menuBox {
  text-align: center;
  color: #fff;
}
#menuBox h1 {
  font-size: 48px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #e74c3c, #f39c12);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#menuBox p { color: #888; margin-bottom: 24px; }
#nameInput {
  padding: 12px 20px;
  font-size: 18px;
  border: 2px solid #444;
  border-radius: 8px;
  background: #222;
  color: #fff;
  outline: none;
  width: 240px;
  text-align: center;
}
#nameInput:focus { border-color: #e74c3c; }
#playBtn {
  display: block;
  margin: 16px auto 0;
  padding: 12px 48px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: #fff;
  cursor: pointer;
}
#playBtn:hover { opacity: 0.9; }

#hud {
  position: fixed;
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  min-width: 160px;
  z-index: 5;
}
#hud.hidden { display: none; }
#hud h3 { margin-bottom: 6px; font-size: 14px; color: #f39c12; }
.lb-row { display: flex; justify-content: space-between; padding: 2px 0; }
.lb-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#pingDisplay {
  position: fixed;
  top: 12px; left: 12px;
  background: rgba(0,0,0,0.6);
  color: #0f0;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: monospace;
  z-index: 5;
}
#pingDisplay.hidden { display: none; }

#death {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7);
  z-index: 8;
}
#death.hidden { display: none; }
#death div { text-align: center; color: #fff; }
#death h2 { font-size: 36px; color: #e74c3c; margin-bottom: 8px; }
#death p { color: #aaa; }

#controls {
  position: fixed;
  bottom: 12px; left: 12px;
  color: #555; font-size: 12px;
  z-index: 5;
}
</style>
</head>
<body>

<div id="menu">
  <div id="menuBox">
    <h1>SHOOTER.IO</h1>
    <p>多人在线射击</p>
    <input id="nameInput" type="text" placeholder="输入你的名字" maxlength="12">
    <button id="playBtn">开始游戏</button>
  </div>
</div>

<div id="hud" class="hidden">
  <h3>排行榜</h3>
  <div id="leaderboard"></div>
</div>

<div id="pingDisplay" class="hidden">PING: --</div>

<div id="death" class="hidden">
  <div>
    <h2>你死了</h2>
    <p>等待复活中...</p>
  </div>
</div>

<div id="controls">WASD 移动 · 鼠标瞄准 · 左键射击</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const hud = document.getElementById('hud');
const deathScreen = document.getElementById('death');
const leaderboardEl = document.getElementById('leaderboard');
const nameInput = document.getElementById('nameInput');
const playBtn = document.getElementById('playBtn');
const pingDisplay = document.getElementById('pingDisplay');

let socket;
let myId;
let mapW, mapH;
let PLAYER_SPEED = 4;
let PLAYER_RADIUS = 18;
let camera = { x: 0, y: 0 };
let mouse = { x: 0, y: 0 };
let keys = { up: false, down: false, left: false, right: false };
let playing = false;
let wasAlive = true;

// Client-side prediction
let inputSeq = 0;
let pendingInputs = [];
let localPlayer = null;

// Entity interpolation
let stateBuffer = [];
const INTERP_DELAY = 100; // ms behind server to interpolate

// Ping tracking
let ping = 0;

// Server state (latest)
let serverPlayers = {};
let serverBullets = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function startGame() {
  const name = nameInput.value.trim() || 'Player';
  menu.classList.add('hidden');
  hud.classList.remove('hidden');
  pingDisplay.classList.remove('hidden');
  playing = true;

  socket = io();

  socket.on('init', (data) => {
    myId = data.id;
    mapW = data.mapW;
    mapH = data.mapH;
    PLAYER_SPEED = data.playerSpeed;
    PLAYER_RADIUS = data.playerRadius;
    socket.emit('setName', name);
  });

  socket.on('state', (s) => {
    const now = Date.now();
    stateBuffer.push({ time: now, players: s.players, bullets: s.bullets });
    // Keep only 1 second of buffer
    while (stateBuffer.length > 2 && stateBuffer[0].time < now - 1000) {
      stateBuffer.shift();
    }

    serverPlayers = s.players;
    serverBullets = s.bullets;

    const me = s.players[myId];
    if (me) {
      if (!me.alive && wasAlive) {
        deathScreen.classList.remove('hidden');
        localPlayer = null;
      }
      if (me.alive && !wasAlive) {
        deathScreen.classList.add('hidden');
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
      wasAlive = me.alive;

      // Server reconciliation
      if (me.alive && localPlayer) {
        // Snap to server position
        localPlayer.x = me.x;
        localPlayer.y = me.y;
        // Re-apply unacknowledged inputs
        const serverSeq = me.seq || 0;
        pendingInputs = pendingInputs.filter(inp => inp.seq > serverSeq);
        for (const inp of pendingInputs) {
          applyMovement(localPlayer, inp.keys);
        }
      } else if (me.alive && !localPlayer) {
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
    }
  });

  socket.on('pong_check', (clientTime) => {
    ping = Date.now() - clientTime;
    const color = ping < 80 ? '#0f0' : ping < 150 ? '#ff0' : '#f00';
    pingDisplay.style.color = color;
    pingDisplay.textContent = `PING: ${ping}ms`;
  });

  // Ping check every 2 seconds
  setInterval(() => {
    if (socket) socket.emit('ping_check', Date.now());
  }, 2000);
}

function applyMovement(obj, inputKeys) {
  let dx = 0, dy = 0;
  if (inputKeys.up) dy -= 1;
  if (inputKeys.down) dy += 1;
  if (inputKeys.left) dx -= 1;
  if (inputKeys.right) dx += 1;
  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    obj.x += (dx / len) * PLAYER_SPEED;
    obj.y += (dy / len) * PLAYER_SPEED;
  }
  obj.x = Math.max(PLAYER_RADIUS, Math.min(mapW - PLAYER_RADIUS, obj.x));
  obj.y = Math.max(PLAYER_RADIUS, Math.min(mapH - PLAYER_RADIUS, obj.y));
}

playBtn.addEventListener('click', startGame);
nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startGame();
});

window.addEventListener('keydown', (e) => {
  if (!playing) return;
  if (e.key === 'w' || e.key === 'W') keys.up = true;
  if (e.key === 's' || e.key === 'S') keys.down = true;
  if (e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'd' || e.key === 'D') keys.right = true;
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'w' || e.key === 'W') keys.up = false;
  if (e.key === 's' || e.key === 'S') keys.down = false;
  if (e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'd' || e.key === 'D') keys.right = false;
});
window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

let shooting = false;
window.addEventListener('mousedown', (e) => { if (e.button === 0) shooting = true; });
window.addEventListener('mouseup', (e) => { if (e.button === 0) shooting = false; });

function sendInput() {
  if (!socket || !playing) return;
  const me = serverPlayers[myId];
  if (!me || !me.alive) return;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const angle = Math.atan2(mouse.y - cy, mouse.x - cx);

  inputSeq++;
  const input = { keys: { ...keys }, angle, seq: inputSeq };
  socket.emit('input', input);

  // Client-side prediction: apply immediately
  if (localPlayer) {
    applyMovement(localPlayer, keys);
    pendingInputs.push({ seq: inputSeq, keys: { ...keys } });
    // Limit buffer size
    if (pendingInputs.length > 120) pendingInputs.shift();
  }

  if (shooting) socket.emit('shoot');
}
setInterval(sendInput, 1000 / 30);

// Interpolate other players between two server states
function getInterpolatedPlayers() {
  const now = Date.now();
  const renderTime = now - INTERP_DELAY;
  const result = {};

  if (stateBuffer.length < 2) {
    // Not enough data, use latest
    for (const id in serverPlayers) {
      result[id] = { ...serverPlayers[id] };
    }
    return result;
  }

  // Find the two states to interpolate between
  let prev = stateBuffer[0];
  let next = stateBuffer[1];
  for (let i = 0; i < stateBuffer.length - 1; i++) {
    if (stateBuffer[i].time <= renderTime && stateBuffer[i + 1].time >= renderTime) {
      prev = stateBuffer[i];
      next = stateBuffer[i + 1];
      break;
    }
  }
  // If renderTime is past all buffered states, use the latest two
  if (renderTime > stateBuffer[stateBuffer.length - 1].time) {
    prev = stateBuffer[stateBuffer.length - 2] || stateBuffer[stateBuffer.length - 1];
    next = stateBuffer[stateBuffer.length - 1];
  }

  const total = next.time - prev.time;
  const t = total > 0 ? Math.max(0, Math.min(1, (renderTime - prev.time) / total)) : 1;

  // Interpolate each player
  const allIds = new Set([...Object.keys(prev.players), ...Object.keys(next.players)]);
  for (const id of allIds) {
    const p0 = prev.players[id];
    const p1 = next.players[id];
    if (p0 && p1) {
      result[id] = {
        ...p1,
        x: p0.x + (p1.x - p0.x) * t,
        y: p0.y + (p1.y - p0.y) * t,
        angle: p0.angle + (p1.angle - p0.angle) * t
      };
    } else if (p1) {
      result[id] = { ...p1 };
    } else if (p0) {
      result[id] = { ...p0 };
    }
  }
  return result;
}

function drawGrid() {
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  const gridSize = 60;
  const offX = -camera.x % gridSize;
  const offY = -camera.y % gridSize;
  for (let x = offX; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = offY; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function drawBorder() {
  ctx.strokeStyle = '#e74c3c';
  ctx.lineWidth = 4;
  ctx.strokeRect(-camera.x, -camera.y, mapW, mapH);
}

function drawPlayer(p, isMe) {
  const sx = p.x - camera.x;
  const sy = p.y - camera.y;
  if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;

  ctx.save();
  ctx.translate(sx, sy);

  // gun
  ctx.save();
  ctx.rotate(p.angle);
  ctx.fillStyle = '#888';
  ctx.fillRect(10, -4, 20, 8);
  ctx.restore();

  // body
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI * 2);
  ctx.fillStyle = p.alive ? p.color : '#333';
  ctx.fill();
  ctx.strokeStyle = isMe ? '#fff' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = isMe ? 3 : 1;
  ctx.stroke();

  // hp bar
  if (p.alive) {
    const barW = 36;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, -30, barW, 5);
    ctx.fillStyle = p.hp > 50 ? '#2ecc71' : p.hp > 25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(-barW / 2, -30, barW * (p.hp / 100), 5);
  }

  // name
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, 34);

  ctx.restore();
}

function drawBullet(b) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) return;
  ctx.beginPath();
  ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx, sy, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function updateLeaderboard() {
  const sorted = Object.values(serverPlayers)
    .sort((a, b) => b.kills - a.kills)
    .slice(0, 8);
  leaderboardEl.innerHTML = sorted.map(p =>
    `<div class="lb-row"><span class="lb-name" style="color:${p.color}">${p.name || 'Player'}</span><span>${p.kills}</span></div>`
  ).join('');
}

function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Use local predicted position for camera
  const me = serverPlayers[myId];
  const renderPos = localPlayer || (me ? { x: me.x, y: me.y } : null);
  if (renderPos) {
    camera.x = renderPos.x - canvas.width / 2;
    camera.y = renderPos.y - canvas.height / 2;
  }

  drawGrid();
  drawBorder();

  for (const b of serverBullets) drawBullet(b);

  // Get interpolated positions for other players
  const interpolated = getInterpolatedPlayers();

  for (const id in interpolated) {
    if (id === myId) continue;
    drawPlayer(interpolated[id], false);
  }

  // Draw self using predicted position
  if (me && localPlayer) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const angle = Math.atan2(mouse.y - cy, mouse.x - cx);
    drawPlayer({
      ...me,
      x: localPlayer.x,
      y: localPlayer.y,
      angle: angle
    }, true);
  } else if (me) {
    drawPlayer(me, true);
  }

  updateLeaderboard();
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
