<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shooter.IO</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}
canvas { display: block; cursor: crosshair; }

#menu {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #1a2a3a 0%, #0d1822 50%, #0a1018 100%);
  z-index: 10; overflow: hidden;
}
#menu.hidden { display: none; }

/* Snow particles in menu background via CSS */
#menuBg {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}

/* Top-left icon buttons */
#menuIcons {
  position: absolute; top: 20px; left: 20px;
  display: flex; gap: 10px; z-index: 2;
}
.menu-icon {
  width: 44px; height: 44px; border: 2px solid rgba(100,180,255,0.3);
  border-radius: 8px; background: rgba(20,40,60,0.6);
  color: rgba(180,220,255,0.7); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.menu-icon:hover { border-color: rgba(100,180,255,0.7); background: rgba(30,60,90,0.7); color: #fff; }
.menu-icon.empty { border-color: rgba(100,180,255,0.15); color: rgba(100,180,255,0.2); cursor: default; }
.menu-icon.empty:hover { border-color: rgba(100,180,255,0.15); background: rgba(20,40,60,0.6); color: rgba(100,180,255,0.2); }

/* Center content */
#menuBox {
  text-align: center; color: #fff; z-index: 2; position: relative;
}
#menuTitle {
  font-size: 72px; font-weight: 900; letter-spacing: 8px; margin-bottom: 40px;
  background: linear-gradient(180deg, #e8f4ff 0%, #80ccff 40%, #4099dd 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none; filter: drop-shadow(0 0 30px rgba(80,180,255,0.3));
  font-family: 'Arial Black', 'Impact', sans-serif;
}

/* Name + Start row */
#playRow {
  display: flex; gap: 12px; align-items: center; justify-content: center;
}
#nameInput {
  width: 280px; padding: 14px 20px; font-size: 18px;
  border: 2px solid rgba(100,180,255,0.3); border-radius: 10px;
  background: rgba(15,30,50,0.8); color: #fff; outline: none;
  text-align: center; letter-spacing: 1px;
  transition: border-color 0.3s;
}
#nameInput:focus { border-color: rgba(100,180,255,0.7); }
#nameInput::placeholder { color: rgba(120,160,200,0.5); }
#startBtn {
  padding: 14px 32px; font-size: 18px; font-weight: bold;
  border: 2px solid rgba(100,180,255,0.5); border-radius: 10px;
  background: rgba(30,80,140,0.6); color: #e0f0ff;
  cursor: pointer; transition: all 0.2s; letter-spacing: 2px;
  white-space: nowrap;
}
#startBtn:hover { background: rgba(40,100,180,0.8); border-color: rgba(120,200,255,0.8); color: #fff; }

/* Modal overlays for settings/account */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 20;
  align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #1a2a3a; border: 1px solid rgba(100,180,255,0.3);
  border-radius: 12px; padding: 24px; color: #fff; width: 340px;
}
.modal-box h3 { font-size: 18px; margin-bottom: 16px; color: #80ccff; }
.modal-close {
  float: right; background: none; border: none; color: #888;
  font-size: 20px; cursor: pointer; padding: 0 4px;
}
.modal-close:hover { color: #fff; }
.modal-input {
  width: 100%; padding: 10px 14px; font-size: 15px;
  border: 2px solid rgba(100,180,255,0.3); border-radius: 8px;
  background: rgba(10,20,35,0.8); color: #fff; outline: none;
  margin-bottom: 10px;
}
.modal-input:focus { border-color: rgba(100,180,255,0.6); }
.modal-input::placeholder { color: rgba(120,160,200,0.4); }
.modal-btn {
  width: 100%; padding: 10px; font-size: 15px; font-weight: bold;
  border: none; border-radius: 8px; cursor: pointer; color: #fff;
  margin-bottom: 8px; transition: opacity 0.2s;
}
.modal-btn:hover { opacity: 0.9; }
.modal-btn.primary { background: linear-gradient(135deg, #2288cc, #1a6699); }
.modal-btn.success { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.modal-btn.danger { background: none; border: 1px solid #555; color: #888; font-size: 13px; }
.modal-btn.danger:hover { border-color: #e74c3c; color: #e74c3c; }
.modal-error { color: #e74c3c; font-size: 13px; margin-top: 4px; min-height: 18px; }
.modal-tabs { display: flex; gap: 0; margin-bottom: 14px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(100,180,255,0.2); }
.modal-tab { flex: 1; padding: 8px; background: rgba(20,40,60,0.6); color: #888; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }
.modal-tab.active { background: rgba(30,80,140,0.7); color: #e0f0ff; }
.modal-form { display: none; }
.modal-form.active { display: block; }
/* User info in account modal */
.user-stats { margin-bottom: 12px; }
.user-stats .stat-row { display: flex; justify-content: space-between; padding: 4px 0; color: #aaa; font-size: 13px; }
.user-stats .stat-val { color: #fff; font-weight: bold; }

/* Skin selector modal */
.skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; padding: 4px; }
.skin-card {
  background: rgba(20,40,60,0.8); border: 2px solid rgba(100,180,255,0.2);
  border-radius: 10px; padding: 8px; text-align: center; cursor: pointer;
  transition: all 0.2s; position: relative;
}
.skin-card:hover { border-color: rgba(100,180,255,0.5); background: rgba(30,60,90,0.8); }
.skin-card.selected { border-color: #4fc3f7; box-shadow: 0 0 12px rgba(79,195,247,0.3); }
.skin-card.locked { opacity: 0.5; cursor: not-allowed; }
.skin-card.locked:hover { border-color: rgba(100,180,255,0.2); background: rgba(20,40,60,0.8); }
.skin-card img { width: 64px; height: 64px; object-fit: contain; image-rendering: auto; }
.skin-card .skin-name { font-size: 11px; color: #cde; margin-top: 4px; font-weight: bold; }
.skin-card .skin-req { font-size: 10px; color: #f39c12; margin-top: 2px; }
.skin-card .skin-req.unlocked { color: #2ecc71; }
.skin-card .skin-lock { position: absolute; top: 4px; right: 4px; font-size: 14px; }
.skin-card .default-circle { width: 64px; height: 64px; margin: 0 auto; border-radius: 50%; background: linear-gradient(135deg, #4fc3f7, #2196f3); }

/* HUD */
#minimap-container {
  position: fixed; top: 12px; right: 12px;
  background: rgba(0,0,0,0.5); padding: 4px;
  border-radius: 8px; border: 1px solid rgba(100,180,255,0.3); z-index: 5;
  transition: all 0.3s ease;
}
#minimap-container.hidden { display: none; }
#minimap-container.expanded {
  top: 50%; left: 50%; right: auto;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); padding: 8px;
  border: 2px solid rgba(100,180,255,0.5);
}
#minimap { display: block; border-radius: 6px; }

#pingDisplay {
  position: fixed; top: 12px; left: 12px;
  background: rgba(0,0,0,0.6); color: #0f0; padding: 6px 10px;
  border-radius: 6px; font-size: 12px; font-family: monospace; z-index: 5;
}
#pingDisplay.hidden { display: none; }

#death {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); z-index: 8;
}
#death.hidden { display: none; }
#death div { text-align: center; color: #fff; }
#death h2 { font-size: 36px; color: #e74c3c; margin-bottom: 8px; }
#death p { color: #aaa; }

</style>
</head>
<body>

<div id="menu">
  <div id="menuBg"></div>

  <!-- Top-left icon buttons -->
  <div id="menuIcons">
    <div class="menu-icon" id="iconSettings" title="Settings">&#9881;</div>
    <div class="menu-icon" id="iconAccount" title="Account">&#9786;</div>
    <div class="menu-icon" id="iconSkin" title="Skins">&#9733;</div>
    <div class="menu-icon empty">&#8203;</div>
  </div>

  <!-- Center content -->
  <div id="menuBox">
    <div id="menuTitle">AAAMIU</div>
    <div id="playRow">
      <input type="text" id="nameInput" placeholder="Player Name" maxlength="12">
      <button id="startBtn">Start</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('settingsModal').classList.remove('active')">&times;</button>
      <h3>Settings</h3>
      <p style="color:#888;font-size:14px;">Coming soon...</p>
    </div>
  </div>

  <!-- Account Modal -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('accountModal').classList.remove('active')">&times;</button>
      <h3>Account</h3>

      <!-- Not logged in -->
      <div id="authForms">
        <div class="modal-tabs">
          <button class="modal-tab active" id="tabLogin">Login</button>
          <button class="modal-tab" id="tabRegister">Register</button>
        </div>
        <div class="modal-form active" id="formLogin">
          <input class="modal-input" type="text" id="loginUsername" placeholder="Username" maxlength="12" autocomplete="username">
          <input class="modal-input" type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
          <button class="modal-btn primary" id="loginBtn">Login</button>
          <div class="modal-error" id="loginError"></div>
        </div>
        <div class="modal-form" id="formRegister">
          <input class="modal-input" type="text" id="regUsername" placeholder="Username (2-12 chars)" maxlength="12" autocomplete="username">
          <input class="modal-input" type="password" id="regPassword" placeholder="Password (6+ chars)" autocomplete="new-password">
          <input class="modal-input" type="password" id="regPassword2" placeholder="Confirm Password" autocomplete="new-password">
          <button class="modal-btn success" id="registerBtn">Register</button>
          <div class="modal-error" id="regError"></div>
        </div>
      </div>

      <!-- Logged in -->
      <div id="userInfo" style="display:none;">
        <div style="color:#80ccff;font-size:16px;margin-bottom:12px;">Welcome, <span id="welcomeName"></span></div>
        <div class="user-stats">
          <div class="stat-row"><span>Kills</span><span class="stat-val" id="statKills">0</span></div>
          <div class="stat-row"><span>Deaths</span><span class="stat-val" id="statDeaths">0</span></div>
          <div class="stat-row"><span>K/D</span><span class="stat-val" id="statKD">0.00</span></div>
          <div class="stat-row"><span>Best Streak</span><span class="stat-val" id="statStreak">0</span></div>
          <div class="stat-row"><span>Games</span><span class="stat-val" id="statGames">0</span></div>
        </div>
        <button class="modal-btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <!-- Skin Modal -->
  <div class="modal-overlay" id="skinModal">
    <div class="modal-box" style="width:400px;">
      <button class="modal-close" onclick="document.getElementById('skinModal').classList.remove('active')">&times;</button>
      <h3>&#9733; Skins</h3>
      <p style="color:#888;font-size:12px;margin-bottom:12px;">击杀怪物解锁更多皮肤</p>
      <div class="skin-grid" id="skinGrid"></div>
    </div>
  </div>
</div>

<div id="minimap-container" class="hidden">
  <canvas id="minimap" width="200" height="150"></canvas>
</div>

<div id="pingDisplay" class="hidden">PING: --</div>

<div id="death" class="hidden">
  <div>
    <h2>你死了</h2>
    <p>等待复活中...</p>
  </div>
</div>


<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
// Skin system
const SKINS = [
  { id: 'default', name: 'Default', src: null, killsRequired: 0 },
  { id: 'tat', name: 'TAT', src: '/skins/tat.png', killsRequired: 0 },
  { id: 'mayuri', name: 'Mayuri', src: '/skins/mayuri.png', killsRequired: 10 },
  { id: 'kurisu', name: 'Kurisu', src: '/skins/kurisu.png', killsRequired: 30 },
  { id: 'suzuha', name: 'Suzuha', src: '/skins/suzuha.png', killsRequired: 60 },
  { id: 'gundam', name: 'Gundam', src: '/skins/gundam.png', killsRequired: 100 },
];
const skinImageCache = {};
function removeWhiteBg(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const d = cx.getImageData(0, 0, c.width, c.height);
  for (let i = 0; i < d.data.length; i += 4) {
    const r = d.data[i], g = d.data[i+1], b = d.data[i+2];
    if (r > 230 && g > 230 && b > 230) {
      d.data[i+3] = 0; // fully transparent
    } else if (r > 200 && g > 200 && b > 200) {
      d.data[i+3] = Math.max(0, d.data[i+3] - 180); // fade near-white
    }
  }
  cx.putImageData(d, 0, 0);
  const cleaned = new Image();
  cleaned.src = c.toDataURL();
  return cleaned;
}
for (const s of SKINS) {
  if (s.src) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { skinImageCache[s.id] = removeWhiteBg(img); };
    img.src = s.src;
  }
}
let selectedSkin = localStorage.getItem('selectedSkin') || 'default';
// Map player socket id -> skin image for rendering
const playerSkinImages = {};
</script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const hud = document.getElementById('minimap-container');
const deathScreen = document.getElementById('death');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const pingDisplay = document.getElementById('pingDisplay');

// Auth elements
const authForms = document.getElementById('authForms');
const userInfo = document.getElementById('userInfo');
const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const formLogin = document.getElementById('formLogin');
const formRegister = document.getElementById('formRegister');

let socket;
let myId;
let mapW, mapH;
let authToken = localStorage.getItem('authToken');
let currentUser = null;

let PLAYER_SPEED = 4;
let PLAYER_RADIUS = 18;
let BULLET_SPEED = 12;
let BULLET_LIFE = 60;
let BULLET_RADIUS = 5;
let SHOOT_COOLDOWN = 150;

let camera = { x: 0, y: 0 };
let mouse = { x: 0, y: 0 };
let keys = { up: false, down: false, left: false, right: false };
let playing = false;
let wasAlive = true;

let inputSeq = 0;
let pendingInputs = [];
let localPlayer = null;

let stateBuffer = [];
const INTERP_DELAY = 100;

let localBullets = [];
let localBulletId = 0;
let lastLocalShot = 0;

let serverBullets = [];
let confirmedBulletMap = {};
let serverMobs = {};
let floatingTexts = []; // For kill rewards

// Map data
let iceBlocks = [];
let iceLakes = [];
let borderPoints = [];
let spawnPoint = { x: 0, y: 0 };
let minimapExpanded = false;

// Snowflake particles
const snowflakes = [];
const SNOW_COUNT = 50;
for (let i = 0; i < SNOW_COUNT; i++) {
  snowflakes.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: Math.random() * 3 + 1,
    speed: Math.random() * 1 + 0.3,
    drift: Math.random() * 0.5 - 0.25,
    opacity: Math.random() * 0.6 + 0.3
  });
}

let hitEffects = [];
let ping = 0;
let serverPlayers = {};

// ─── Auth UI ───

tabLogin.onclick = () => {
  tabLogin.classList.add('active'); tabRegister.classList.remove('active');
  formLogin.classList.add('active'); formRegister.classList.remove('active');
};
tabRegister.onclick = () => {
  tabRegister.classList.add('active'); tabLogin.classList.remove('active');
  formRegister.classList.add('active'); formLogin.classList.remove('active');
};

document.getElementById('loginBtn').onclick = async () => {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    document.getElementById('loginBtn').disabled = true;
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; return; }
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = data.user;
    showUserInfo(data.user);
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    document.getElementById('loginBtn').disabled = false;
  }
};

document.getElementById('registerBtn').onclick = async () => {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const password2 = document.getElementById('regPassword2').value;
  const errEl = document.getElementById('regError');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = '请填写所有字段'; return; }
  if (password !== password2) { errEl.textContent = '两次密码不一致'; return; }

  try {
    document.getElementById('registerBtn').disabled = true;
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; return; }
    authToken = data.token;
    localStorage.setItem('authToken', authToken);
    currentUser = data.user;
    showUserInfo(data.user);
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    document.getElementById('registerBtn').disabled = false;
  }
};

document.getElementById('logoutBtn').onclick = () => {
  authToken = null;
  currentUser = null;
  localStorage.removeItem('authToken');
  userInfo.style.display = 'none';
  authForms.style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').placeholder = 'Player Name';
};

function showUserInfo(user) {
  authForms.style.display = 'none';
  userInfo.style.display = 'block';
  document.getElementById('welcomeName').textContent = user.username;
  document.getElementById('statKills').textContent = user.stats.kills;
  document.getElementById('statDeaths').textContent = user.stats.deaths;
  const kd = user.stats.deaths > 0 ? (user.stats.kills / user.stats.deaths).toFixed(2) : user.stats.kills.toFixed(2);
  document.getElementById('statKD').textContent = kd;
  document.getElementById('statStreak').textContent = user.stats.bestKillStreak;
  document.getElementById('statGames').textContent = user.stats.gamesPlayed;
  // Pre-fill name input with username
  document.getElementById('nameInput').value = user.username;
}

// Check saved token on load
async function checkAuth() {
  if (!authToken) return;
  try {
    const res = await fetch('/api/auth/profile', {
      headers: { 'Authorization': 'Bearer ' + authToken }
    });
    if (res.ok) {
      const data = await res.json();
      currentUser = { username: data.username, stats: data.stats };
      showUserInfo(currentUser);
    } else {
      localStorage.removeItem('authToken');
      authToken = null;
    }
  } catch (e) {
    // ignore
  }
}
checkAuth();

// ─── Game Start ───

function startGame(playerName) {
  menu.classList.add('hidden');
  hud.classList.remove('hidden');
  pingDisplay.classList.remove('hidden');
  playing = true;

  socket = io({ transports: ['websocket'] });

  socket.on('init', (data) => {
    myId = data.id;
    mapW = data.mapW;
    mapH = data.mapH;
    PLAYER_SPEED = data.playerSpeed;
    PLAYER_RADIUS = data.playerRadius;
    BULLET_SPEED = data.bulletSpeed;
    BULLET_LIFE = data.bulletLife;
    BULLET_RADIUS = data.bulletRadius;
    SHOOT_COOLDOWN = data.shootCooldown;
    iceBlocks = data.iceBlocks || [];
    iceLakes = data.iceLakes || [];
    borderPoints = data.borderPoints || [];
    spawnPoint = data.spawnPoint || { x: 0, y: 0 };

    // Authenticate if logged in
    if (authToken) {
      socket.emit('auth', authToken);
    }
    socket.emit('setName', { name: playerName, skinId: selectedSkin });
  });

  socket.on('authSuccess', (data) => {
    // Server confirmed auth
  });

  socket.on('state', (s) => {
    const now = Date.now();
    stateBuffer.push({ time: now, players: s.players, bullets: s.bullets });
    while (stateBuffer.length > 2 && stateBuffer[0].time < now - 1000) {
      stateBuffer.shift();
    }

    serverPlayers = s.players;
    serverBullets = s.bullets;
    serverMobs = s.mobs || {};
    reconcileBullets(s.bullets);

    const me = s.players[myId];
    if (me) {
      if (!me.alive && wasAlive) deathScreen.classList.remove('hidden');
      if (me.alive && !wasAlive) {
        deathScreen.classList.add('hidden');
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
      wasAlive = me.alive;

      if (me.alive && localPlayer) {
        localPlayer.x = me.x;
        localPlayer.y = me.y;
        const serverSeq = me.seq || 0;
        pendingInputs = pendingInputs.filter(inp => inp.seq > serverSeq);
        for (const inp of pendingInputs) {
          applyMovement(localPlayer, inp.keys);
        }
      } else if (me.alive && !localPlayer) {
        localPlayer = { x: me.x, y: me.y };
        pendingInputs = [];
      }
    }
  });

  socket.on('shootConfirm', (data) => {
    if (data.clientId != null) confirmedBulletMap[data.clientId] = data.serverId;
  });

  socket.on('hits', (events) => {
    for (const hit of events) {
      hitEffects.push({ x: hit.x, y: hit.y, time: 20, killed: hit.killed });
      if (serverPlayers[hit.targetId]) serverPlayers[hit.targetId].hp = hit.hp;
    }
  });

  socket.on('mobKillReward', (data) => {
    floatingTexts.push({
      x: data.x, y: data.y,
      text: `+${data.heal}HP`,
      color: '#2ecc71',
      time: 60
    });
    floatingTexts.push({
      x: data.x, y: data.y - 20,
      text: `击杀 ${data.mobName} +${data.xp}`,
      color: '#f39c12',
      time: 60
    });
  });

  let pingSentTime = 0;
  socket.on('pong_check', () => {
    ping = Date.now() - pingSentTime;
    const color = ping < 80 ? '#0f0' : ping < 150 ? '#ff0' : '#f00';
    pingDisplay.style.color = color;
    pingDisplay.textContent = `PING: ${ping}ms`;
  });

  setInterval(() => { if (socket) { pingSentTime = Date.now(); socket.emit('ping_check'); } }, 2000);
}

// ─── Game Logic ───

function reconcileBullets(sBullets) {
  const serverIds = new Set(sBullets.map(b => b.id));
  localBullets = localBullets.filter(lb => {
    const serverId = confirmedBulletMap[lb.id];
    if (serverId != null && serverIds.has(serverId)) return false;
    if (serverId != null && !serverIds.has(serverId)) {
      delete confirmedBulletMap[lb.id];
      return false;
    }
    lb.life--;
    return lb.life > 0;
  });
}

// Client-side border check (same ray casting as server)
function clientIsInsideBorder(x, y) {
  if (borderPoints.length < 3) return true;
  let inside = false;
  const n = borderPoints.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = borderPoints[i].x, yi = borderPoints[i].y;
    const xj = borderPoints[j].x, yj = borderPoints[j].y;
    if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// Client-side ice block collision (same as server)
function clientCollidesBlock(x, y, radius) {
  for (const b of iceBlocks) {
    const dx = x - b.x, dy = y - b.y;
    if (dx * dx + dy * dy < (radius + b.r) * (radius + b.r)) return true;
  }
  return false;
}

function clientCanMove(x, y) {
  return clientIsInsideBorder(x, y) && !clientCollidesBlock(x, y, PLAYER_RADIUS);
}

function applyMovement(obj, inputKeys) {
  let dx = 0, dy = 0;
  if (inputKeys.up) dy -= 1;
  if (inputKeys.down) dy += 1;
  if (inputKeys.left) dx -= 1;
  if (inputKeys.right) dx += 1;
  if (dx || dy) {
    const len = Math.sqrt(dx * dx + dy * dy);
    const mvx = (dx / len) * PLAYER_SPEED;
    const mvy = (dy / len) * PLAYER_SPEED;
    const newX = obj.x + mvx;
    const newY = obj.y + mvy;

    if (clientCanMove(newX, newY)) {
      obj.x = newX;
      obj.y = newY;
    } else if (clientCanMove(newX, obj.y)) {
      obj.x = newX;
    } else if (clientCanMove(obj.x, newY)) {
      obj.y = newY;
    }
    // else: both directions blocked, don't move
  }
  obj.x = Math.max(PLAYER_RADIUS, Math.min(mapW - PLAYER_RADIUS, obj.x));
  obj.y = Math.max(PLAYER_RADIUS, Math.min(mapH - PLAYER_RADIUS, obj.y));
}

window.addEventListener('keydown', (e) => {

function getAngle() {
  return Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2);
}

function tryShoot() {
  if (!socket || !playing) return;
  const me = serverPlayers[myId];
  if (!me || !me.alive || !localPlayer) return;
  const now = Date.now();
  if (now - lastLocalShot < SHOOT_COOLDOWN) return;
  lastLocalShot = now;
  const angle = getAngle();
  const cId = localBulletId++;
  localBullets.push({
    id: cId,
    x: localPlayer.x + Math.cos(angle) * (PLAYER_RADIUS + 8),
    y: localPlayer.y + Math.sin(angle) * (PLAYER_RADIUS + 8),
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    life: BULLET_LIFE,
    color: me.color
  });
  socket.emit('shoot', { angle, clientId: cId });
}

function sendInput() {
  if (!socket || !playing) return;
  const me = serverPlayers[myId];
  if (!me || !me.alive) return;
  inputSeq++;
  socket.emit('input', { keys: { ...keys }, angle: getAngle(), seq: inputSeq });
  if (localPlayer) {
    applyMovement(localPlayer, keys);
    pendingInputs.push({ seq: inputSeq, keys: { ...keys } });
    if (pendingInputs.length > 120) pendingInputs.shift();
  }
  if (shooting) tryShoot();
}
setInterval(sendInput, 1000 / 30);

function getInterpolatedPlayers() {
  const now = Date.now();
  const renderTime = now - INTERP_DELAY;
  const result = {};
  if (stateBuffer.length < 2) {
    for (const id in serverPlayers) result[id] = { ...serverPlayers[id] };
    return result;
  }
  let prev = stateBuffer[0], next = stateBuffer[1];
  for (let i = 0; i < stateBuffer.length - 1; i++) {
    if (stateBuffer[i].time <= renderTime && stateBuffer[i + 1].time >= renderTime) {
      prev = stateBuffer[i]; next = stateBuffer[i + 1]; break;
    }
  }
  if (renderTime > stateBuffer[stateBuffer.length - 1].time) {
    prev = stateBuffer[stateBuffer.length - 2] || stateBuffer[stateBuffer.length - 1];
    next = stateBuffer[stateBuffer.length - 1];
  }
  const total = next.time - prev.time;
  const t = total > 0 ? Math.max(0, Math.min(1, (renderTime - prev.time) / total)) : 1;
  const allIds = new Set([...Object.keys(prev.players), ...Object.keys(next.players)]);
  for (const id of allIds) {
    const p0 = prev.players[id]; const p1 = next.players[id];
    if (p0 && p1) {
      result[id] = { ...p1, x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t, angle: p0.angle + (p1.angle - p0.angle) * t };
    } else result[id] = { ...(p1 || p0) };
  }
  return result;
}

function getRenderBullets() {
  const all = [];
  const confirmed = new Set(Object.values(confirmedBulletMap));
  for (const b of serverBullets) { if (!confirmed.has(b.id)) all.push({ x: b.x, y: b.y, color: b.color }); }
  for (const lb of localBullets) all.push({ x: lb.x, y: lb.y, color: lb.color });
  return all;
}

function updateLocalBullets() {
  for (const b of localBullets) { b.x += b.vx; b.y += b.vy; }
  for (let i = localBullets.length - 1; i >= 0; i--) {
    const b = localBullets[i];
    if (b.x < 0 || b.x > mapW || b.y < 0 || b.y > mapH) localBullets.splice(i, 1);
  }
}

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);

// ─── Rendering ───

let bgCache = null, bgCacheW = 0, bgCacheH = 0;
function drawBackground() {
  if (!bgCache || bgCacheW !== canvas.width || bgCacheH !== canvas.height) {
    bgCacheW = canvas.width; bgCacheH = canvas.height;
    bgCache = document.createElement('canvas');
    bgCache.width = bgCacheW; bgCache.height = bgCacheH;
    const bctx = bgCache.getContext('2d');
    const grd = bctx.createRadialGradient(bgCacheW/2, bgCacheH/2, 0, bgCacheW/2, bgCacheH/2, bgCacheW);
    grd.addColorStop(0, '#d6e8f0');
    grd.addColorStop(1, '#b0c8d8');
    bctx.fillStyle = grd;
    bctx.fillRect(0, 0, bgCacheW, bgCacheH);
  }
  ctx.drawImage(bgCache, 0, 0);
}

function drawGrid() {
  // Grid removed for cleaner look
}

function drawBorder() {
  if (borderPoints.length < 3) return;
  ctx.save();
  const bp = borderPoints;

  // Build the polygon path (straight lines matching server collision)
  function traceBorderPath() {
    ctx.moveTo(bp[0].x - camera.x, bp[0].y - camera.y);
    for (let i = 1; i < bp.length; i++) {
      ctx.lineTo(bp[i].x - camera.x, bp[i].y - camera.y);
    }
    ctx.closePath();
  }

  // Draw the area outside the border as darker
  ctx.fillStyle = 'rgba(40, 65, 85, 0.45)';
  ctx.beginPath();
  ctx.rect(-camera.x - 500, -camera.y - 500, mapW + 1000, mapH + 1000);
  // Cut out playable area (reverse winding)
  ctx.moveTo(bp[0].x - camera.x, bp[0].y - camera.y);
  for (let i = bp.length - 1; i >= 0; i--) {
    ctx.lineTo(bp[i].x - camera.x, bp[i].y - camera.y);
  }
  ctx.closePath();
  ctx.fill();

  // Draw border line - straight segments matching actual collision
  ctx.beginPath();
  traceBorderPath();

  // Outer glow
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = 'rgba(79, 195, 247, 0.8)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Main line
  ctx.shadowBlur = 0;
  ctx.beginPath();
  traceBorderPath();
  ctx.strokeStyle = 'rgba(130, 220, 255, 0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner soft glow
  ctx.beginPath();
  traceBorderPath();
  ctx.strokeStyle = 'rgba(200, 240, 255, 0.3)';
  ctx.lineWidth = 6;
  ctx.stroke();

  ctx.restore();
}

function drawIceLakes() {
  for (const lake of iceLakes) {
    const sx = lake.x - camera.x, sy = lake.y - camera.y;
    if (sx + lake.r < -50 || sx - lake.r > canvas.width + 50 || sy + lake.r < -50 || sy - lake.r > canvas.height + 50) continue;

    // Frozen lake surface
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, lake.r);
    grd.addColorStop(0, 'rgba(180, 225, 255, 0.5)');
    grd.addColorStop(0.7, 'rgba(140, 200, 240, 0.35)');
    grd.addColorStop(1, 'rgba(100, 180, 230, 0.1)');
    ctx.beginPath();
    ctx.arc(sx, sy, lake.r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Ice cracks
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 + lake.x * 0.01;
      const len = lake.r * (0.4 + Math.sin(lake.y + i) * 0.3);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(angle) * len, sy + Math.sin(angle) * len);
      ctx.stroke();
    }

    // Rim highlight
    ctx.beginPath();
    ctx.arc(sx, sy, lake.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200, 230, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawIceBlocks() {
  for (const block of iceBlocks) {
    const sx = block.x - camera.x, sy = block.y - camera.y;
    const r = block.r || 40;
    if (sx + r < -10 || sx - r > canvas.width + 10 || sy + r < -10 || sy - r > canvas.height + 10) continue;

    ctx.save();
    ctx.translate(sx, sy);

    // Draw irregular shape using pre-generated vertices
    const shape = block.shape;
    if (shape && shape.length > 0) {
      ctx.beginPath();
      ctx.moveTo(shape[0].x, shape[0].y);
      for (let i = 1; i < shape.length; i++) {
        const prev = shape[i - 1];
        const curr = shape[i];
        const cpx = (prev.x + curr.x) / 2;
        const cpy = (prev.y + curr.y) / 2;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      const last = shape[shape.length - 1];
      const first = shape[0];
      ctx.quadraticCurveTo(last.x, last.y, (last.x + first.x) / 2, (last.y + first.y) / 2);
      ctx.closePath();

      // Ice gradient fill
      const grd = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r);
      grd.addColorStop(0, 'rgba(210, 240, 255, 0.95)');
      grd.addColorStop(0.4, 'rgba(160, 215, 245, 0.9)');
      grd.addColorStop(0.8, 'rgba(100, 180, 225, 0.85)');
      grd.addColorStop(1, 'rgba(70, 150, 200, 0.8)');
      ctx.fillStyle = grd;
      ctx.fill();

      // Edge outline
      ctx.strokeStyle = 'rgba(80, 160, 210, 0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner highlight (top-left shine)
      ctx.beginPath();
      ctx.ellipse(-r * 0.15, -r * 0.2, r * 0.35, r * 0.2, -0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.fill();

      // Small sparkle dots
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath();
      ctx.arc(-r * 0.25, -r * 0.3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(r * 0.2, r * 0.1, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Inner cracks
      ctx.strokeStyle = 'rgba(80, 160, 220, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-r * 0.1, -r * 0.1);
      ctx.lineTo(r * 0.3, r * 0.2);
      ctx.lineTo(r * 0.1, r * 0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(r * 0.3, r * 0.2);
      ctx.lineTo(r * 0.5, 0);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawSnowflakes() {
  for (const s of snowflakes) {
    // Snow moves in screen space
    s.y += s.speed;
    s.x += s.drift;
    if (s.y > canvas.height + 10) { s.y = -10; s.x = Math.random() * canvas.width; }
    if (s.x > canvas.width + 10) s.x = -10;
    if (s.x < -10) s.x = canvas.width + 10;

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
    ctx.fill();
  }
}

function drawPlayer(p, isMe) {
  const sx = p.x - camera.x, sy = p.y - camera.y;
  if (sx < -80 || sx > canvas.width + 80 || sy < -80 || sy > canvas.height + 80) return;
  ctx.save(); ctx.translate(sx, sy);

  const skinId = p.skinId || null;
  const skin = skinId && skinId !== 'default' ? skinImageCache[skinId] : null;
  const hasSkin = skin && skin.complete && skin.naturalWidth > 0 && p.alive;

  if (hasSkin) {
    // Draw custom skin
    const size = 100;
    // Gun still rotates
    ctx.save(); ctx.rotate(p.angle);
    ctx.fillStyle = '#888'; ctx.fillRect(30, -3, 22, 6);
    ctx.restore();
    // Draw full character image
    if (!p.alive) ctx.globalAlpha = 0.3;
    ctx.drawImage(skin, -size/2, -size/2, size, size);
    ctx.globalAlpha = 1;
  } else {
    // Default circle player
    ctx.save(); ctx.rotate(p.angle);
    ctx.fillStyle = '#888'; ctx.fillRect(10, -4, 20, 8);
    ctx.restore();
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fillStyle = p.alive ? p.color : '#333'; ctx.fill();
    ctx.strokeStyle = isMe ? '#fff' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isMe ? 3 : 1; ctx.stroke();
  }

  // hp bar
  if (p.alive) {
    const bw = hasSkin ? 56 : 36;
    const barY = hasSkin ? -56 : -34;
    ctx.fillStyle = '#333'; ctx.fillRect(-bw/2, barY, bw, 5);
    ctx.fillStyle = p.hp > 50 ? '#2ecc71' : p.hp > 25 ? '#f39c12' : '#e74c3c';
    ctx.fillRect(-bw/2, barY, bw * (p.hp / 100), 5);
  }
  // name
  ctx.fillStyle = '#fff'; ctx.font = hasSkin ? 'bold 13px sans-serif' : '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, hasSkin ? 58 : 34);
  ctx.restore();
}

function drawBullet(b) {
  const sx = b.x - camera.x, sy = b.y - camera.y;
  if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) return;
  ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2);
  ctx.fillStyle = b.color; ctx.fill();
  ctx.beginPath(); ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function drawHitEffects() {
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    const h = hitEffects[i];
    const sx = h.x - camera.x, sy = h.y - camera.y;
    const progress = 1 - h.time / 20;
    ctx.save(); ctx.translate(sx, sy); ctx.globalAlpha = 1 - progress;
    if (h.killed) {
      const r = 20 + progress * 40;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#f39c12'; ctx.globalAlpha = (1 - progress) * 0.5; ctx.fill();
    } else {
      const r = 8 + progress * 15;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.restore(); ctx.globalAlpha = 1;
    h.time--;
    if (h.time <= 0) hitEffects.splice(i, 1);
  }
}

function drawIceLeg(ctx, s, len) {
  ctx.fillStyle = 'rgba(70, 210, 240, 0.75)';
  ctx.strokeStyle = 'rgba(170, 240, 255, 0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-s * 2.5, 0);
  ctx.lineTo(-s * 1.5, s * len * 0.5);
  ctx.lineTo(-s * 2, s * len);
  ctx.lineTo(s * 1, s * len);
  ctx.lineTo(s * 1.5, s * len * 0.5);
  ctx.lineTo(s * 2.5, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Crack on leg
  ctx.strokeStyle = 'rgba(200, 250, 255, 0.3)';
  ctx.beginPath();
  ctx.moveTo(0, s * 2);
  ctx.lineTo(-s, s * len * 0.6);
  ctx.stroke();
  // Claw
  ctx.fillStyle = 'rgba(180, 250, 255, 0.7)';
  ctx.beginPath();
  ctx.moveTo(-s * 1.5, s * len);
  ctx.lineTo(-s * 2.5, s * (len + 3));
  ctx.lineTo(-s * 0.5, s * len);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s * 0.5, s * len);
  ctx.lineTo(s * 1.5, s * (len + 3));
  ctx.lineTo(s * 2, s * len);
  ctx.fill();
}

function drawMob(m) {
  const sx = m.x - camera.x, sy = m.y - camera.y;
  if (sx < -150 || sx > canvas.width + 150 || sy < -150 || sy > canvas.height + 150) return;

  ctx.save();
  ctx.translate(sx, sy);

  const t = Date.now() / 1000;

  if (m.type === 'wolf' || m.type === 'wolf_alpha') {
    const isAlpha = m.type === 'wolf_alpha';
    // === Ice Crystal Wolf ===
    const s = m.radius / 14; // scale factor (base radius 14)
    const isChasing = m.state === 'chase';
    const walkCycle = isChasing ? Math.sin(t * 12) : Math.sin(t * 3);
    const breathe = Math.sin(t * 2) * 0.03;

    ctx.save();
    ctx.rotate(m.angle);
    ctx.scale(1 + breathe, 1 - breathe * 0.5);

    // Glow aura (simplified)
    ctx.fillStyle = isAlpha ? 'rgba(130, 100, 255, 0.1)' : 'rgba(100, 220, 255, 0.08)';
    ctx.beginPath();
    ctx.arc(0, 0, s * 25, 0, Math.PI * 2);
    ctx.fill();

    // Tail (ice shards trailing behind)
    ctx.save();
    ctx.translate(-s * 22, 0);
    const tailWag = Math.sin(t * (isChasing ? 8 : 3)) * 0.3;
    ctx.rotate(tailWag);
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = `rgba(120, 210, 255, ${0.6 - i * 0.15})`;
      ctx.strokeStyle = 'rgba(180, 240, 255, 0.6)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-s * (3 + i * 4), -s * (1 + i));
      ctx.lineTo(-s * (8 + i * 5), s * (i % 2 === 0 ? -3 : 3) - i);
      ctx.lineTo(-s * (3 + i * 4), s * (1 + i));
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
    ctx.restore();

    // Back legs
    const legAngle1 = isChasing ? Math.sin(t * 12) * 0.6 : Math.sin(t * 3) * 0.15;
    const legAngle2 = isChasing ? Math.sin(t * 12 + Math.PI) * 0.6 : Math.sin(t * 3 + Math.PI) * 0.15;
    ctx.save();
    // Back left leg
    ctx.save();
    ctx.translate(-s * 10, -s * 6);
    ctx.rotate(legAngle1);
    drawIceLeg(ctx, s, 16);
    ctx.restore();
    // Back right leg
    ctx.save();
    ctx.translate(-s * 10, s * 6);
    ctx.rotate(legAngle2);
    drawIceLeg(ctx, s, 16);
    ctx.restore();
    ctx.restore();

    // Front legs
    ctx.save();
    // Front left
    ctx.save();
    ctx.translate(s * 6, -s * 6);
    ctx.rotate(legAngle2 * 0.8);
    drawIceLeg(ctx, s, 14);
    ctx.restore();
    // Front right
    ctx.save();
    ctx.translate(s * 6, s * 6);
    ctx.rotate(legAngle1 * 0.8);
    drawIceLeg(ctx, s, 14);
    ctx.restore();
    ctx.restore();

    // Main body - ice crystal segments
    ctx.fillStyle = isAlpha ? '#6648dd' : '#45d5f0';
    ctx.strokeStyle = 'rgba(180, 240, 255, 0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(s * 12, 0);
    ctx.lineTo(s * 8, -s * 7);
    ctx.lineTo(s * 2, -s * 9);
    ctx.lineTo(-s * 8, -s * 8);
    ctx.lineTo(-s * 16, -s * 5);
    ctx.lineTo(-s * 18, 0);
    ctx.lineTo(-s * 16, s * 5);
    ctx.lineTo(-s * 8, s * 8);
    ctx.lineTo(s * 2, s * 9);
    ctx.lineTo(s * 8, s * 7);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Ice crack lines on body
    ctx.strokeStyle = 'rgba(200, 250, 255, 0.4)';
    ctx.lineWidth = 0.8;
    const cracks = [
      [[-s*5,-s*7],[s*2,-s*2],[-s*2,s*4]],
      [[s*6,-s*5],[s*1,-s*1],[s*5,s*4]],
      [[-s*12,-s*3],[-s*6,0],[-s*10,s*5]],
      [[-s*3,s*6],[s*4,s*2],[s*8,s*5]]
    ];
    for (const crack of cracks) {
      ctx.beginPath();
      ctx.moveTo(crack[0][0], crack[0][1]);
      for (let i = 1; i < crack.length; i++) ctx.lineTo(crack[i][0], crack[i][1]);
      ctx.stroke();
    }

    // Ice spikes on back
    const spikes = [
      { x: -s * 10, h: s * 8, w: s * 3 },
      { x: -s * 5, h: s * 12, w: s * 4 },
      { x: 0, h: s * 14, w: s * 4.5 },
      { x: s * 4, h: s * 10, w: s * 3.5 },
      { x: s * 7, h: s * 6, w: s * 2.5 }
    ];
    ctx.fillStyle = isAlpha ? 'rgba(120, 100, 240, 0.85)' : 'rgba(90, 220, 250, 0.85)';
    ctx.strokeStyle = 'rgba(180, 245, 255, 0.6)';
    ctx.lineWidth = 0.8;
    for (const spike of spikes) {
      const wobble = Math.sin(t * 2 + spike.x * 0.1) * s * 0.5;
      ctx.beginPath();
      ctx.moveTo(spike.x - spike.w, -s * 6);
      ctx.lineTo(spike.x + wobble, -s * 6 - spike.h);
      ctx.lineTo(spike.x + spike.w, -s * 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    // Head
    ctx.save();
    ctx.translate(s * 12, 0);
    ctx.fillStyle = isAlpha ? '#7050e0' : '#55d0f0';
    ctx.strokeStyle = 'rgba(180, 240, 255, 0.7)';
    ctx.lineWidth = 1.2;
    // Angular wolf head shape
    ctx.beginPath();
    ctx.moveTo(s * 10, 0); // snout tip
    ctx.lineTo(s * 5, -s * 4);
    ctx.lineTo(s * 1, -s * 6);
    // Left ear (ice spike)
    ctx.lineTo(-s * 1, -s * 12);
    ctx.lineTo(-s * 3, -s * 6);
    ctx.lineTo(-s * 6, -s * 5);
    ctx.lineTo(-s * 6, s * 5);
    // Right ear
    ctx.lineTo(-s * 3, s * 6);
    ctx.lineTo(-s * 1, s * 12);
    ctx.lineTo(s * 1, s * 6);
    ctx.lineTo(s * 5, s * 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Head cracks
    ctx.strokeStyle = 'rgba(200, 250, 255, 0.35)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(s * 3, -s * 4);
    ctx.lineTo(0, -s * 1);
    ctx.lineTo(s * 2, s * 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-s * 3, -s * 3);
    ctx.lineTo(-s * 1, s * 1);
    ctx.stroke();

    // Jaw / mouth line
    ctx.strokeStyle = 'rgba(20, 80, 120, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s * 10, 0);
    ctx.lineTo(s * 4, s * 1);
    ctx.lineTo(s * 1, 0);
    ctx.stroke();

    // Icicle fangs
    if (isChasing) {
      ctx.fillStyle = 'rgba(220, 250, 255, 0.9)';
      ctx.beginPath();
      ctx.moveTo(s * 8, s * 1);
      ctx.lineTo(s * 7, s * 4);
      ctx.lineTo(s * 6, s * 1);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 5, s * 1);
      ctx.lineTo(s * 4.5, s * 3);
      ctx.lineTo(s * 3.5, s * 0.5);
      ctx.fill();
    }

    // Eyes - glowing cyan
    ctx.fillStyle = isChasing ? '#ff3333' : '#00eeff';
    ctx.beginPath();
    ctx.ellipse(s * 3, -s * 2.5, s * 2, s * 1.2, 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 3, s * 2.5, s * 2, s * 1.2, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Eye highlights
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s * 3.5, -s * 2.5, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 3.5, s * 2.5, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore(); // head

    // Ice particle effects when chasing
    if (isChasing) {
      for (let i = 0; i < 5; i++) {
        const px = -s * 15 + Math.sin(t * 5 + i * 1.3) * s * 8;
        const py = Math.cos(t * 4 + i * 1.7) * s * 10;
        const ps = s * (1 + Math.random() * 1.5);
        ctx.fillStyle = `rgba(180, 240, 255, ${0.3 + Math.sin(t * 3 + i) * 0.2})`;
        ctx.fillRect(px - ps/2, py - ps/2, ps, ps);
      }
    }

    ctx.restore(); // main rotation
  } else if (m.type === 'golem') {
    // Ice golem - large crystal shape
    ctx.save();
    // Body - irregular crystal
    const sides = 7;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
      const vary = i % 2 === 0 ? 1.0 : 0.8;
      const px = Math.cos(angle) * m.radius * vary;
      const py = Math.sin(angle) * m.radius * vary;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(100, 180, 230, 0.9)';
    ctx.fill();
    ctx.strokeStyle = '#4488bb';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Inner glow
    ctx.beginPath();
    ctx.arc(0, -5, m.radius * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 235, 255, 0.5)';
    ctx.fill();
    // Eyes
    ctx.save();
    ctx.rotate(m.angle);
    ctx.fillStyle = '#aaeeff';
    ctx.beginPath();
    ctx.arc(m.radius * 0.35, -6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(m.radius * 0.35, 6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();
  } else if (m.type === 'frost_wyrm') {
    // Frost Dragon/Wyrm - large serpentine body
    const s = m.radius / 35;
    const t2 = t;
    ctx.save();
    ctx.rotate(m.angle);
    // Body segments (serpentine)
    for (let i = 4; i >= 0; i--) {
      const segX = -s * i * 14;
      const segY = Math.sin(t2 * 3 + i * 0.8) * s * 6;
      const segR = s * (16 - i * 1.5);
      ctx.fillStyle = 'rgba(40, 75, 170, 0.85)';
      ctx.beginPath();
      ctx.arc(segX, segY, segR, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(100, 150, 255, 0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    // Head
    ctx.fillStyle = '#2855bb';
    ctx.beginPath();
    ctx.moveTo(s * 20, 0);
    ctx.lineTo(s * 8, -s * 12);
    ctx.lineTo(-s * 5, -s * 10);
    ctx.lineTo(-s * 8, 0);
    ctx.lineTo(-s * 5, s * 10);
    ctx.lineTo(s * 8, s * 12);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(100, 160, 255, 0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Horns
    ctx.fillStyle = 'rgba(120, 170, 255, 0.8)';
    ctx.beginPath();
    ctx.moveTo(s * 2, -s * 10);
    ctx.lineTo(-s * 4, -s * 20);
    ctx.lineTo(-s * 2, -s * 9);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(s * 2, s * 10);
    ctx.lineTo(-s * 4, s * 20);
    ctx.lineTo(-s * 2, s * 9);
    ctx.fill();
    // Eyes
    // frost wyrm eyes
    ctx.fillStyle = '#ff2222';
    ctx.beginPath();
    ctx.ellipse(s * 8, -s * 5, s * 3, s * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 8, s * 5, s * 3, s * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (m.type === 'ice_elemental') {
    // Ice Elemental - swirling ice energy
    const s = m.radius / 24;
    ctx.save();
    // Swirling particles
    for (let i = 0; i < 8; i++) {
      const angle = t * 2 + (i / 8) * Math.PI * 2;
      const dist = s * (10 + Math.sin(t * 3 + i) * 4);
      const px = Math.cos(angle) * dist;
      const py = Math.sin(angle) * dist;
      const ps = s * (3 + Math.sin(t * 4 + i * 2) * 1.5);
      ctx.fillStyle = `rgba(80, 140, 255, ${0.4 + Math.sin(t * 2 + i) * 0.2})`;
      ctx.beginPath();
      ctx.arc(px, py, ps, 0, Math.PI * 2);
      ctx.fill();
    }
    // Core
    ctx.fillStyle = 'rgba(70, 130, 210, 0.7)';
    ctx.beginPath();
    ctx.arc(0, 0, s * 14, 0, Math.PI * 2);
    ctx.fill();
    // Inner crystal
    ctx.fillStyle = 'rgba(180, 220, 255, 0.7)';
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = t * 0.5 + (i / 6) * Math.PI * 2;
      const r = s * (i % 2 === 0 ? 8 : 5);
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(200, 240, 255, 0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Eyes (in direction of angle)
    ctx.save();
    ctx.rotate(m.angle);
    ctx.fillStyle = '#ccffff';
    ctx.beginPath();
    ctx.arc(s * 5, -s * 3, s * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 5, s * 3, s * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.restore();
  }

  // HP bar
  const barW = m.radius * 2.2;
  const hpRatio = m.hp / m.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(-barW / 2, -m.radius - 14, barW, 5);
  ctx.fillStyle = hpRatio > 0.5 ? '#2ecc71' : hpRatio > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(-barW / 2, -m.radius - 14, barW * hpRatio, 5);

  // Name (color by zone)
  const zoneColors = { 1: '#ccddee', 2: '#aabbdd', 3: '#ff8888' };
  ctx.fillStyle = zoneColors[m.zone] || '#ccddee';
  ctx.font = (m.zone === 3 ? 'bold ' : '') + '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(m.name, 0, m.radius + 16);

  ctx.restore();
}

function drawFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    const sx = ft.x - camera.x, sy = ft.y - camera.y;
    const progress = 1 - ft.time / 60;
    ctx.save();
    ctx.globalAlpha = 1 - progress;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, sx, sy - progress * 40);
    ctx.restore();
    ft.time--;
    if (ft.time <= 0) floatingTexts.splice(i, 1);
  }
}

function drawMinimap() {
  const mw = minimapCanvas.width, mh = minimapCanvas.height;
  const scaleX = mw / mapW, scaleY = mh / mapH;

  // Background
  minimapCtx.fillStyle = 'rgba(20, 35, 50, 0.85)';
  minimapCtx.fillRect(0, 0, mw, mh);

  // Draw border shape
  if (borderPoints.length > 2) {
    const bp = borderPoints;
    minimapCtx.beginPath();
    minimapCtx.moveTo(bp[0].x * scaleX, bp[0].y * scaleY);
    for (let i = 0; i < bp.length; i++) {
      const curr = bp[i], next = bp[(i + 1) % bp.length];
      const cpx = (curr.x + next.x) / 2 * scaleX;
      const cpy = (curr.y + next.y) / 2 * scaleY;
      minimapCtx.quadraticCurveTo(curr.x * scaleX, curr.y * scaleY, cpx, cpy);
    }
    minimapCtx.closePath();
    minimapCtx.fillStyle = 'rgba(50, 80, 110, 0.7)';
    minimapCtx.fill();
    minimapCtx.strokeStyle = 'rgba(100, 180, 255, 0.6)';
    minimapCtx.lineWidth = minimapExpanded ? 2 : 1.5;
    minimapCtx.stroke();
  }

  // Draw other players
  for (const id in serverPlayers) {
    if (id === myId) continue;
    const p = serverPlayers[id];
    if (!p.alive) continue;
    minimapCtx.fillStyle = p.color || '#3498db';
    minimapCtx.beginPath();
    minimapCtx.arc(p.x * scaleX, p.y * scaleY, 3, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // Draw spawn point marker
  minimapCtx.strokeStyle = '#ffdd44';
  minimapCtx.lineWidth = minimapExpanded ? 2 : 1.5;
  const spx = spawnPoint.x * scaleX, spy = spawnPoint.y * scaleY;
  const sr = minimapExpanded ? 10 : 5;
  minimapCtx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + (i * 4 * Math.PI) / 5;
    const x = spx + Math.cos(a) * sr, y = spy + Math.sin(a) * sr;
    if (i === 0) minimapCtx.moveTo(x, y); else minimapCtx.lineTo(x, y);
  }
  minimapCtx.closePath();
  minimapCtx.stroke();

  // Draw self
  const me = serverPlayers[myId];
  const pos = localPlayer || (me ? { x: me.x, y: me.y } : null);
  if (pos) {
    const px = pos.x * scaleX, py = pos.y * scaleY;
    const dotR = minimapExpanded ? 5 : 3;
    // Glow
    minimapCtx.shadowColor = '#ffee00';
    minimapCtx.shadowBlur = minimapExpanded ? 10 : 6;
    // Player dot
    minimapCtx.fillStyle = '#ffee00';
    minimapCtx.beginPath();
    minimapCtx.arc(px, py, dotR, 0, Math.PI * 2);
    minimapCtx.fill();
    minimapCtx.shadowBlur = 0;
    minimapCtx.strokeStyle = '#fff';
    minimapCtx.lineWidth = minimapExpanded ? 1.5 : 1;
    minimapCtx.stroke();
  }
}

function render() {
  drawBackground();
  const me = serverPlayers[myId];
  const rp = localPlayer || (me ? { x: me.x, y: me.y } : null);
  if (rp) { camera.x = rp.x - canvas.width / 2; camera.y = rp.y - canvas.height / 2; }
  drawGrid(); drawBorder();
  drawIceLakes();
  drawIceBlocks();
  updateLocalBullets();
  for (const b of getRenderBullets()) drawBullet(b);
  drawHitEffects();
  // Draw mobs
  for (const id in serverMobs) drawMob(serverMobs[id]);
  drawFloatingTexts();
  const interp = getInterpolatedPlayers();
  for (const id in interp) { if (id !== myId) drawPlayer(interp[id], false); }
  if (me && localPlayer) {
    drawPlayer({ ...me, x: localPlayer.x, y: localPlayer.y, angle: getAngle() }, true);
  } else if (me) drawPlayer(me, true);
  drawMinimap();
  drawSnowflakes();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
